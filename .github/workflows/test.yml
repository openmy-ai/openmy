name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e . ruff
      - name: Run lint
        run: ruff check .
      - name: Smoke help and health
        run: |
          openmy --help
          openmy skill health.check --json
      - name: Run tests
        run: python3 -m pytest tests -q
