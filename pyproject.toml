[project]
name = "daytape"
version = "0.1.0"
description = "个人每日上下文系统"
requires-python = ">=3.10"
dependencies = ["rich>=13.0"]

[project.scripts]
daytape = "daytape.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/daytape"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
