name: README sync guard

on:
  pull_request:
    paths:
      - README.md
      - README.en.md
      - README.fr.md
      - README.it.md
      - README.ja.md
      - README.ko.md
  push:
    branches:
      - main
    paths:
      - README.md
      - README.en.md
      - README.fr.md
      - README.it.md
      - README.ja.md
      - README.ko.md

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Verify multilingual README sync
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            python3 scripts/check_readme_sync.py --base "${{ github.event.pull_request.base.sha }}" --head "${{ github.event.pull_request.head.sha }}"
          else
            python3 scripts/check_readme_sync.py --base "${{ github.event.before }}" --head "${{ github.sha }}"
          fi
