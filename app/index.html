<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenMy</title>
<meta name="description" content="个人每日上下文工作台">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
  --bg: #ffffff;
  --bg-hover: #f7f7f5;
  --bg-active: #f0f0ee;
  --bg-sidebar: #fbfbfa;
  --bg-tag: #f0f0ee;
  --text: #37352f;
  --text-secondary: #787774;
  --text-light: #9b9a97;
  --border: #e9e9e7;
  --accent: #2eaadc;
  --accent-light: #e8f4f8;
  --success: #0f7b6c;
  --success-bg: #dbeddb;
  --warning: #d9730d;
  --warning-bg: #fdecc8;

  --role-ai: #529cca;
  --role-ai-bg: #e8f4f8;
  --role-merchant: #d9730d;
  --role-merchant-bg: #fdecc8;
  --role-pet: #e255a1;
  --role-pet-bg: #fce2db;
  --role-self: #9065b0;
  --role-self-bg: #e8deee;
  --role-interpersonal: #0f7b6c;
  --role-interpersonal-bg: #dbeddb;
  --role-uncertain: #9b9a97;
  --role-uncertain-bg: #f0f0ee;

  --radius: 6px;
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
  --shadow: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
  --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-serif: 'Noto Serif SC', Georgia, serif;
  --transition: 0.15s ease;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

.app {
  display: grid;
  grid-template-columns: 240px 1fr;
  min-height: 100vh;
}

.sidebar {
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border);
  padding: 20px 12px;
  overflow-y: auto;
  position: sticky;
  top: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

.logo { padding: 4px 8px; margin-bottom: 2px; }
.logo-title { font-family: var(--font-serif); font-size: 15px; font-weight: 700; }
.logo-sub { font-size: 11px; color: var(--text-light); margin-top: 1px; }

.search-box { padding: 0 4px; margin: 12px 0; }
.search-box input,
.field-input,
.field-select,
.field-textarea {
  width: 100%;
  padding: 10px 12px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-size: 13px;
  font-family: var(--font-body);
  outline: none;
  transition: border var(--transition), box-shadow var(--transition);
}

.search-box input:focus,
.field-input:focus,
.field-select:focus,
.field-textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px var(--accent-light);
}

.field-textarea {
  min-height: 96px;
  resize: vertical;
}

.stats {
  padding: 8px 12px;
  font-size: 12px;
  color: var(--text-secondary);
  display: flex;
  gap: 12px;
}

.stat-item { display: flex; align-items: center; gap: 3px; }
.stat-num { font-weight: 600; color: var(--text); }

.mini-role-bar {
  display: flex;
  height: 3px;
  border-radius: 2px;
  overflow: hidden;
  margin: 4px 12px 8px;
  gap: 1px;
}

.mini-role-bar div { height: 100%; min-width: 3px; border-radius: 1px; }

.role-legend-mini {
  padding: 0 12px 8px;
  display: flex;
  flex-wrap: wrap;
  gap: 4px 8px;
}

.role-legend-mini span {
  font-size: 10px;
  color: var(--text-light);
  display: flex;
  align-items: center;
  gap: 3px;
}

.role-legend-mini .dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  display: inline-block;
}

.divider { height: 1px; background: var(--border); margin: 4px 12px 8px; }
.section-label { font-size: 11px; font-weight: 600; color: var(--text-light); padding: 4px 12px; text-transform: uppercase; }

.date-list { flex: 1; overflow-y: auto; margin-top: 4px; }
.date-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 12px;
  border-radius: var(--radius);
  cursor: pointer;
  transition: background var(--transition);
  font-size: 14px;
  color: var(--text-secondary);
  border: none;
  background: transparent;
  width: 100%;
  text-align: left;
}

.date-item:hover { background: var(--bg-hover); }
.date-item.active { background: var(--bg-active); color: var(--text); font-weight: 500; }
.date-item .icon { font-size: 14px; opacity: 0.6; }
.date-item .meta { margin-left: auto; font-size: 11px; color: var(--text-light); }

.main {
  max-width: 980px;
  margin: 0 auto;
  padding: 40px 48px 80px;
  width: 100%;
}

.page-header { margin-bottom: 32px; }
.page-icon { font-size: 36px; margin-bottom: 8px; }
.page-title { font-family: var(--font-serif); font-size: 32px; font-weight: 700; line-height: 1.2; }
.page-meta { font-size: 13px; color: var(--text-light); margin-top: 6px; display: flex; gap: 16px; flex-wrap: wrap; }

.view-tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 24px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 8px;
}

.view-tab {
  padding: 6px 16px;
  border: none;
  background: transparent;
  color: var(--text-secondary);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  border-radius: var(--radius);
  transition: all var(--transition);
  white-space: nowrap;
}

.view-tab:hover { background: var(--bg-hover); color: var(--text); }
.view-tab.active { background: var(--bg-active); color: var(--text); font-weight: 600; }
.view-content { display: none; }
.view-content.active { display: block; }

.role-tags { display: flex; flex-wrap: wrap; gap: 6px; margin: 0 0 24px; }
.role-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 10px;
  border-radius: 4px;
  font-size: 12px;
  cursor: pointer;
  border: none;
  font-family: var(--font-body);
  transition: opacity var(--transition);
  opacity: 0.7;
}

.role-tag:hover { opacity: 1; }
.role-tag.active { opacity: 1; font-weight: 600; }

.callout {
  background: var(--bg-hover);
  border-radius: var(--radius);
  padding: 16px 18px;
  margin-bottom: 28px;
  display: flex;
  gap: 12px;
}

.callout-icon { font-size: 20px; flex-shrink: 0; }
.callout-body { font-size: 14px; color: var(--text); flex: 1; }

.props-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}

.prop-card {
  background: var(--bg-sidebar);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
}

.prop-card-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--text-light);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
  text-transform: uppercase;
}

.prop-card-title .dot { width: 8px; height: 8px; border-radius: 50%; }
.prop-item { font-size: 13px; color: var(--text-secondary); padding: 4px 0; border-bottom: 1px dashed var(--border); line-height: 1.5; }
.prop-item:last-child { border-bottom: none; }
.prop-item .time-tag { font-size: 11px; color: var(--text-light); font-variant-numeric: tabular-nums; margin-right: 4px; }
.prop-item .project-tag { font-size: 10px; padding: 1px 5px; border-radius: 3px; background: var(--accent-light); color: var(--accent); font-weight: 500; margin-right: 4px; }
.prop-count { font-size: 11px; color: var(--text-light); font-weight: 400; }

.timeline { position: relative; padding-left: 80px; }
.timeline::before { content: ''; position: absolute; left: 60px; top: 0; bottom: 0; width: 2px; background: var(--border); }
.tl-node { position: relative; padding: 0 0 32px 32px; }
.tl-node.hidden { display: none; }
.tl-node:last-child { padding-bottom: 0; }
.tl-node:last-child::after { content: ''; position: absolute; left: -22px; top: 14px; bottom: 0; width: 2px; background: var(--bg); z-index: 1; }
.tl-dot { position: absolute; left: -26px; top: 6px; width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--border); background: var(--bg); z-index: 2; transition: all 0.2s; }
.tl-node:hover .tl-dot { transform: scale(1.3); box-shadow: 0 0 0 4px rgba(46, 170, 220, 0.15); }
.tl-time { position: absolute; left: -80px; top: 3px; width: 50px; text-align: right; font-size: 13px; font-weight: 700; font-variant-numeric: tabular-nums; color: var(--text-light); }
.tl-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 18px; transition: box-shadow 0.2s, border-color 0.2s; }
.tl-node:hover .tl-card { box-shadow: var(--shadow); border-color: #d0d0ce; }
.tl-role-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }

.role-label,
.status-pill {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
}

.role-label.needs-review { outline: 2px dashed var(--warning); outline-offset: 1px; }
.status-pill { background: var(--success-bg); color: var(--success); }

.seg-distilled { font-size: 15px; line-height: 1.7; margin-bottom: 10px; color: var(--text); }
.seg-distilled-placeholder { font-size: 14px; color: var(--text-secondary); font-style: italic; background: var(--bg-sidebar); padding: 8px 12px; border-radius: 4px; border-left: 3px solid var(--border); }
.raw-controls { display: flex; justify-content: flex-end; }
.raw-btn,
.action-btn {
  background: var(--bg-sidebar);
  border: 1px solid var(--border);
  padding: 8px 12px;
  border-radius: 4px;
  font-size: 12px;
  color: var(--text-secondary);
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  transition: all var(--transition);
}

.action-btn.primary {
  background: var(--text);
  color: #ffffff;
  border-color: var(--text);
}

.action-btn:hover,
.raw-btn:hover { background: var(--border); color: var(--text); }

.seg-raw {
  margin-top: 12px;
  padding: 16px;
  background: var(--bg-sidebar);
  border-radius: var(--radius);
  font-size: 14px;
  line-height: 1.8;
  color: var(--text-secondary);
  border: 1px dashed var(--border);
  display: none;
}

.seg-raw.visible { display: block; }
.seg-raw p { margin-bottom: 12px; }
.seg-raw p:last-child { margin-bottom: 0; }

.table-view { width: 100%; overflow-x: auto; }
.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table th, .data-table td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); }
.data-table th { background: var(--bg-sidebar); font-weight: 600; color: var(--text-light); }
.data-table tr:hover { background: var(--bg-hover); }
.data-table .td-time { font-variant-numeric: tabular-nums; font-weight: 500; }
.data-table .td-summary { color: var(--text); max-width: 400px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.chart-card { background: var(--bg-sidebar); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
.chart-card h3 { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: var(--text); }
.chart-card canvas { max-height: 260px; }

.briefing-banner {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  border-radius: 12px;
  padding: 24px 28px;
  margin-bottom: 24px;
  color: #fff;
  position: relative;
  overflow: hidden;
}

.briefing-banner::after {
  content: '';
  position: absolute;
  top: -30%;
  right: -10%;
  width: 200px;
  height: 200px;
  background: rgba(255, 255, 255, 0.08);
  border-radius: 50%;
}

.briefing-banner h2 { font-family: var(--font-serif); font-size: 20px; font-weight: 700; margin-bottom: 6px; position: relative; z-index: 1; }
.briefing-summary { font-size: 14px; opacity: 0.92; line-height: 1.6; position: relative; z-index: 1; }
.briefing-stats-row { display: flex; gap: 24px; margin-top: 14px; flex-wrap: wrap; position: relative; z-index: 1; }
.briefing-stat { display: flex; flex-direction: column; }
.briefing-stat-num { font-size: 22px; font-weight: 700; }
.briefing-stat-label { font-size: 11px; opacity: 0.75; }

.briefing-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 24px;
}

.briefing-card,
.job-card {
  background: var(--bg-sidebar);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  transition: box-shadow 0.2s;
}

.briefing-card:hover,
.job-card:hover { box-shadow: var(--shadow); }

.briefing-card-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--text-light);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
  text-transform: uppercase;
}

.briefing-card-full { grid-column: 1 / -1; }

.time-block { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px dashed var(--border); align-items: flex-start; }
.time-block:last-child { border-bottom: none; padding-bottom: 0; }
.tb-period { font-size: 12px; font-weight: 700; color: var(--accent); white-space: nowrap; min-width: 56px; padding-top: 2px; }
.tb-body { flex: 1; }
.tb-summary { font-size: 14px; color: var(--text); line-height: 1.6; margin-bottom: 6px; }
.tb-tags { display: flex; flex-wrap: wrap; gap: 4px; }
.tb-tag { font-size: 10px; padding: 2px 8px; border-radius: 10px; display: inline-flex; align-items: center; gap: 3px; }
.tb-tag-person { background: #f0f9ff; color: #0369a1; }
.tb-tag-app { background: #f0fdf4; color: #15803d; }

.event-item {
  font-size: 13px;
  color: var(--text-secondary);
  padding: 6px 0;
  border-bottom: 1px dashed var(--border);
  line-height: 1.5;
}

.event-item:last-child { border-bottom: none; }
.people-grid { display: flex; flex-wrap: wrap; gap: 10px; }
.people-chip { display: flex; align-items: center; gap: 8px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; min-width: 140px; }
.people-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; }
.people-info { flex: 1; }
.people-name { font-size: 13px; font-weight: 600; color: var(--text); }
.people-meta { font-size: 11px; color: var(--text-light); }

.app-bar-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; }
.app-bar-name { font-size: 12px; font-weight: 500; color: var(--text); min-width: 80px; }
.app-bar-track { flex: 1; height: 8px; background: var(--bg-active); border-radius: 4px; overflow: hidden; }
.app-bar-fill { height: 100%; background: linear-gradient(90deg, #667eea, #764ba2); border-radius: 4px; transition: width 0.6s ease; }
.app-bar-duration { font-size: 11px; color: var(--text-light); min-width: 60px; text-align: right; }

.search-stack,
.form-stack {
  display: grid;
  gap: 12px;
}

.form-label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 6px;
}

.inline-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.pipeline-layout {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(280px, 360px);
  gap: 16px;
}

.job-item {
  width: 100%;
  text-align: left;
  padding: 14px 16px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--bg);
  cursor: pointer;
  transition: all var(--transition);
}

.job-item:hover { box-shadow: var(--shadow); }
.job-item.active { border-color: rgba(46, 170, 220, 0.35); background: var(--accent-light); }

.job-log {
  margin: 0;
  padding: 14px;
  border-radius: var(--radius);
  background: var(--bg);
  border: 1px solid var(--border);
  font-family: "SFMono-Regular", "Menlo", monospace;
  white-space: pre-wrap;
  word-break: break-word;
  font-size: 12px;
  line-height: 1.6;
}

.muted { color: var(--text-light); }

.empty {
  text-align: center;
  padding: 120px 40px 80px;
  color: var(--text-light);
}

.empty .icon { font-size: 40px; margin-bottom: 12px; }

.empty-state {
  padding: 18px;
  border-radius: var(--radius);
  border: 1px dashed var(--border);
  color: var(--text-light);
  background: var(--bg);
}

.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--text);
  color: #fff;
  padding: 10px 24px;
  border-radius: 20px;
  font-size: 13px;
  z-index: 3000;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}

.toast.visible { opacity: 1; }

@media (max-width: 900px) {
  .app { grid-template-columns: 1fr; }
  .sidebar { position: static; height: auto; }
  .main { padding: 24px 20px 60px; }
  .view-tabs { overflow-x: auto; padding-bottom: 12px; }
  .briefing-grid,
  .props-grid,
  .charts-grid,
  .pipeline-layout { grid-template-columns: 1fr; }
  .timeline { padding-left: 66px; }
  .timeline::before { left: 46px; }
  .tl-time { left: -66px; width: 40px; }
}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-title">📓 OpenMy</div>
      <div class="logo-sub">每日上下文</div>
    </div>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="全局搜索..." />
    </div>
    <div class="stats" id="stats"></div>
    <div class="mini-role-bar" id="globalBar"></div>
    <div class="role-legend-mini" id="globalLegend"></div>
    <div class="divider"></div>
    <div class="section-label">日期</div>
    <div class="date-list" id="dateList"></div>
  </aside>

  <main class="main" id="main">
    <div class="empty" id="emptyState">
      <div class="icon">📓</div>
      <p>从左侧选择日期开始浏览</p>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
const ROLE_STYLES = {
  '老婆': { emoji: '👩', color: '#d946ef', bg: '#fdf4ff' },
  '老公': { emoji: '👨', color: '#8b5cf6', bg: '#f5f3ff' },
  '妈妈': { emoji: '🤱', color: '#ec4899', bg: '#fdf2f8' },
  '爸爸': { emoji: '👨‍🦳', color: '#6366f1', bg: '#eef2ff' },
  '朋友': { emoji: '🙋', color: '#f59e0b', bg: '#fffbeb' },
  'AI助手': { emoji: '🤖', color: 'var(--role-ai)', bg: 'var(--role-ai-bg)' },
  '商家': { emoji: '🏪', color: 'var(--role-merchant)', bg: 'var(--role-merchant-bg)' },
  '宠物': { emoji: '🐾', color: 'var(--role-pet)', bg: 'var(--role-pet-bg)' },
  '自己': { emoji: '💭', color: 'var(--role-self)', bg: 'var(--role-self-bg)' },
};

const DEFAULT_STYLE = { emoji: '❓', color: 'var(--role-uncertain)', bg: 'var(--role-uncertain-bg)' };

const ROLES = {
  '跟AI说': { emoji: '🤖', color: 'var(--role-ai)', bg: 'var(--role-ai-bg)' },
  '跟商家': { emoji: '🏪', color: 'var(--role-merchant)', bg: 'var(--role-merchant-bg)' },
  '跟宠物': { emoji: '🐕', color: 'var(--role-pet)', bg: 'var(--role-pet-bg)' },
  '自言自语': { emoji: '💭', color: 'var(--role-self)', bg: 'var(--role-self-bg)' },
  '跟人聊': { emoji: '💬', color: 'var(--role-interpersonal)', bg: 'var(--role-interpersonal-bg)' },
  '不确定': { emoji: '—', color: 'var(--role-uncertain)', bg: 'var(--role-uncertain-bg)' },
};

const PIPELINE_KIND_LABELS = {
  context: '刷新上下文',
  clean: '清理文本',
  roles: '识别对象',
  distill: '整理摘要',
  briefing: '生成日报',
  run: '重新运行',
};

const PIPELINE_STATUS_LABELS = {
  queued: '排队中',
  running: '运行中',
  succeeded: '已完成',
  failed: '失败',
};

const state = {
  allDates: [],
  stats: null,
  currentDate: '',
  currentData: null,
  currentMeta: null,
  currentBriefing: null,
  currentView: 'briefing',
  activeFilters: new Set(),
  context: {},
  loops: [],
  projects: [],
  decisions: [],
  corrections: [],
  searchResults: [],
  jobs: [],
  selectedJobId: '',
  selectedJobDetail: null,
  handledCompletedJobs: new Set(),
  chartInstances: [],
};

let searchTimer = null;

function getRoleStyle(value) {
  return ROLE_STYLES[value] || DEFAULT_STYLE;
}

function showToast(message) {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.classList.add('visible');
  clearTimeout(showToast.timer);
  showToast.timer = setTimeout(() => toast.classList.remove('visible'), 2600);
}

function escapeHtml(value) {
  return String(value || '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#39;');
}

function plainText(value) {
  return String(value || '')
    .replace(/\*\*(.*?)\*\*/g, '$1')
    .replace(/\*(.*?)\*/g, '$1')
    .replace(/`([^`]+)`/g, '$1')
    .replace(/<[^>]+>/g, '')
    .trim();
}

function fmtText(value) {
  const safe = escapeHtml(value || '');
  return safe.split(/\n+/).map((paragraph) => paragraph.trim() ? `<p>${paragraph}</p>` : '').join('');
}

function fmtNum(value) {
  const number = Number(value || 0);
  if (number >= 10000) return `${(number / 10000).toFixed(1)}万`;
  if (number >= 1000) return `${(number / 1000).toFixed(1)}k`;
  return String(number);
}

function renderEmptyState(text) {
  return `<div class="empty-state">${escapeHtml(text)}</div>`;
}

function renderEventList(items, renderItem, emptyText) {
  if (!items || !items.length) {
    return renderEmptyState(emptyText);
  }
  return items.map(renderItem).join('');
}

function formatPipelineKind(value) {
  return PIPELINE_KIND_LABELS[value] || value || '未知任务';
}

function formatPipelineStatus(value) {
  return PIPELINE_STATUS_LABELS[value] || value || '未知状态';
}

function formatPipelineStep(value) {
  if (!value) return '—';
  return PIPELINE_KIND_LABELS[value] || value;
}

async function fetchJson(url, fallback = undefined) {
  try {
    const response = await fetch(url);
    if (!response.ok) {
      if (fallback !== undefined) return fallback;
      throw new Error(`${response.status} ${response.statusText}`);
    }
    return await response.json();
  } catch (error) {
    if (fallback !== undefined) return fallback;
    showToast(`请求失败：${error.message}`);
    throw error;
  }
}

async function postJson(url, payload) {
  const response = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
  });
  const data = await response.json().catch(() => ({}));
  if (!response.ok) {
    throw new Error(data.error || `${response.status} ${response.statusText}`);
  }
  return data;
}

async function init() {
  document.getElementById('searchInput').addEventListener('input', (event) => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => runSearch(event.target.value.trim()), 250);
  });

  document.getElementById('searchInput').addEventListener('keydown', (event) => {
    if (event.key === 'Enter') {
      clearTimeout(searchTimer);
      runSearch(event.target.value.trim());
    }
  });

  await loadSidebar();
  await Promise.all([
    loadContext(),
    refreshCorrectionsFeed(),
    refreshPipelineJobs(),
  ]);

  if (state.currentData) {
    renderDayLayout();
  }

  setInterval(refreshPipelineJobs, 5000);
}

async function loadSidebar() {
  const [dates, stats] = await Promise.all([
    fetchJson('/api/dates', []),
    fetchJson('/api/stats', { total_dates: 0, total_segments: 0, total_words: 0, role_distribution: {} }),
  ]);

  state.allDates = dates || [];
  state.stats = stats || {};
  renderSidebar();

  const defaultDate = state.allDates.find((item) => item.is_default)?.date || state.allDates[0]?.date || '';
  if (defaultDate) {
    await loadDate(defaultDate);
  }
}

function renderSidebar() {
  const stats = state.stats || {};
  document.getElementById('stats').innerHTML = `
    <span class="stat-item"><span class="stat-num">${stats.total_dates || 0}</span>天</span>
    <span class="stat-item"><span class="stat-num">${stats.total_segments || 0}</span>段</span>
    <span class="stat-item"><span class="stat-num">${fmtNum(stats.total_words || 0)}</span>字</span>
  `;

  const roleDistribution = stats.role_distribution || {};
  const totalRoles = Object.values(roleDistribution).reduce((sum, value) => sum + value, 0);
  if (totalRoles > 0) {
    document.getElementById('globalBar').innerHTML = Object.entries(roleDistribution).map(([role, count]) => {
      const style = getRoleStyle(role);
      const color = style.color.startsWith('#') ? style.color : '#9b9a97';
      return `<div style="flex:${count};background:${color}"></div>`;
    }).join('');
    document.getElementById('globalLegend').innerHTML = Object.entries(roleDistribution).map(([role, count]) => {
      const style = getRoleStyle(role);
      const color = style.color.startsWith('#') ? style.color : '#9b9a97';
      return `<span><span class="dot" style="background:${color}"></span>${escapeHtml(role)} ${count}</span>`;
    }).join('');
  } else {
    document.getElementById('globalBar').innerHTML = '';
    document.getElementById('globalLegend').innerHTML = '';
  }

  const dateList = document.getElementById('dateList');
  if (!state.allDates.length) {
    dateList.innerHTML = renderEmptyState('还没有找到可浏览的日期数据。');
    return;
  }

  dateList.innerHTML = state.allDates.map((item) => `
    <button class="date-item ${item.date === state.currentDate ? 'active' : ''}" type="button" onclick="loadDate('${escapeHtml(item.date)}')">
      <span class="icon">📄</span>
      ${escapeHtml(item.date)}
      <span class="meta">${item.segments}段</span>
    </button>
  `).join('');
}

async function loadContext() {
  const [context, loops, projects, decisions] = await Promise.all([
    fetchJson('/api/context', {}),
    fetchJson('/api/context/loops', []),
    fetchJson('/api/context/projects', []),
    fetchJson('/api/context/decisions', []),
  ]);

  state.context = context || {};
  state.loops = loops || [];
  state.projects = projects || [];
  state.decisions = decisions || [];

  if (document.getElementById('view-overview')) {
    renderOverviewView();
  }
  if (document.getElementById('view-corrections')) {
    renderCorrectionsView();
  }
}

async function loadDate(date, focusTime = '') {
  // Template routes: /api/date/${date}/meta and /api/date/${date}/briefing
  const [detail, meta, briefing] = await Promise.all([
    fetchJson(`/api/date/${date}`, null),
    fetchJson(`/api/date/${date}/meta`, null),
    fetchJson(`/api/date/${date}/briefing`, null),
  ]);

  if (!detail) {
    showToast(`日期 ${date} 不存在`);
    return;
  }

  state.currentDate = date;
  state.currentData = detail;
  state.currentMeta = meta || detail.meta || {};
  state.currentBriefing = briefing || null;
  renderSidebar();
  renderDayLayout();

  if (focusTime) {
    switchView('timeline');
    requestAnimationFrame(() => scrollToSegment(focusTime));
  }
}

  const detail = state.currentData;

  const roleCounts = {};

  detail.segments.forEach((segment) => {
    const addressedTo = segment.role?.addressed_to || '未识别';
    roleCounts[addressedTo] = (roleCounts[addressedTo] || 0) + 1;
    if (segment.role?.needs_review) needsReviewCount += 1;

  let html = '';
  html += `<div class="page-header">
    <div class="page-icon">📅</div>

      <span>${detail.segments.length} 个场景</span>

      <span>上下文 ${state.context.generated_at ? '已就绪' : '待生成'}</span>
    </div>

  const calloutText = meta.daily_summary || state.context.status_line || '';

      <div class="callout-body">${escapeHtml(plainText(calloutText))}</div>

  </div>`;

  html += '<div class="role-tags" id="filter-bar">';

    html += `<button class="role-tag active" style="background:var(--bg-tag);color:var(--text)" data-role="all" onclick="filterRole('all')">全部 <span class="cnt">${detail.segments.length}</span></button>`;
    Object.entries(roleCounts).forEach(([role, count]) => {
      const style = getRoleStyle(role);
      html += `<button class="role-tag" style="background:${style.bg};color:${style.color}" data-role="${escapeHtml(role)}" onclick="filterRole('${escapeHtml(role)}')">${style.emoji} ${escapeHtml(role)} <span class="cnt">${count}</span></button>`;

      html += `<button class="role-tag" style="background:#fff3db;color:#d9730d" data-role="needs_review" onclick="filterRole('needs_review')">🚨 待确认 <span class="cnt">${needsReviewCount}</span></button>`;

  html += '</div>';

  html += '<div id="view-overview" class="view-content"></div>';
  html += '<div id="view-briefing" class="view-content"></div>';
  html += '<div id="view-timeline" class="view-content"></div>';
  html += '<div id="view-table" class="view-content"></div>';
  html += '<div id="view-charts" class="view-content"></div>';
  html += '<div id="view-corrections" class="view-content"></div>';
  html += '<div id="view-pipeline" class="view-content"></div>';

  document.getElementById('main').innerHTML = html;
  renderOverviewView();
  renderBriefingView();
  renderTimelineView();
  renderTableView();
  renderChartsView();
  renderCorrectionsView();
  renderPipelineView();
  switchView(state.currentView);
}

function renderMetaPanels(meta) {
  const groups = [
    { key: 'events', title: '📌 事件', dot: '#2eaadc' },
    { key: 'intents', title: '🧭 意图', dot: '#0f7b6c' },
    { key: 'facts', title: '🧱 事实', dot: '#64748b' },
    { key: 'decisions', title: '🎯 决策', dot: '#d9730d' },
    { key: 'todos', title: '✅ 待办', dot: '#16a34a' },
    { key: 'insights', title: '⚡ 洞察', dot: '#9065b0' },
  ];

  const cards = groups.map((group) => {
    const items = meta?.[group.key] || [];
    if (!items.length) return '';
    return `<div class="prop-card">
      <div class="prop-card-title"><span class="dot" style="background:${group.dot}"></span>${group.title} <span class="prop-count">${items.length}</span></div>
      ${items.map((item) => {
        const time = escapeHtml(item.time || '');
        const project = escapeHtml(item.project || item.topic || '');
        const summary = escapeHtml(plainText(item.summary || item.what || item.task || item.content || item.decision || item.fact || item.intent || ''));
        return `<div class="prop-item">
          ${time ? `<span class="time-tag">${time}</span>` : ''}
          ${project ? `<span class="project-tag">${project}</span>` : ''}
          ${summary}
        </div>`;
      }).join('')}
    </div>`;
  }).filter(Boolean);

  if (!cards.length) return '';
  return `<div class="props-grid">${cards.join('')}</div>`;
}

function getSegmentDistillation(segment, meta) {
  const highlights = [];
  (meta.events || []).filter((item) => item.time === segment.time).forEach((item) => {
    highlights.push(`📌 <strong>${escapeHtml(item.project || '事件')}</strong> ${escapeHtml(plainText(item.summary || ''))}`);
  });
  (meta.decisions || []).filter((item) => item.time === segment.time).forEach((item) => {
    highlights.push(`🎯 <strong>${escapeHtml(item.project || '决策')}</strong> ${escapeHtml(plainText(item.what || item.decision || ''))}`);
  });
  (meta.todos || []).filter((item) => item.time === segment.time).forEach((item) => {
    highlights.push(`✅ <strong>${escapeHtml(item.project || '待办')}</strong> ${escapeHtml(plainText(item.task || ''))}`);
  });
  if (highlights.length > 0) return highlights.join('<br>');
  if (segment.summary) return `<div class="seg-distilled-placeholder">${escapeHtml(plainText(segment.summary))}</div>`;
  return `<div class="seg-distilled-placeholder">${escapeHtml(plainText(segment.preview || ''))}</div>`;
}

    const style = getRoleStyle(addressedTo);
    const needsReview = Boolean(segment.role?.needs_review);
    const distilled = getSegmentDistillation(segment, meta);

    html += `<div class="tl-node" data-role="${escapeHtml(addressedTo)}" data-needs-review="${needsReview ? 'true' : 'false'}" data-segment-time="${escapeHtml(segment.time)}">
      <span class="tl-time">${escapeHtml(segment.time)}</span>
      <div class="tl-dot" style="border-color:${style.color};background:${needsReview ? '#fff3db' : style.bg}"></div>
      <div class="tl-card">
        <div class="tl-role-row">
          <span class="role-label ${needsReview ? 'needs-review' : ''}" style="background:${style.bg};color:${style.color}">
            ${style.emoji} ${escapeHtml(addressedTo)}
          </span>
          ${segment.summary ? `<span class="status-pill">${escapeHtml(plainText(segment.summary))}</span>` : ''}
        </div>
        <div class="seg-distilled">${distilled}</div>
        <div class="raw-controls"><button class="raw-btn" type="button" onclick="toggleRawText(this)">👁️ 显示原文</button></div>
        <div class="seg-raw">${fmtText(segment.text || '')}</div>
      </div>
    </div>`;
  });
  html += '</div>';
  node.innerHTML = html;
}

function renderTableView() {
  const node = document.getElementById('view-table');
  if (!node) return;

  const detail = state.currentData;
  let html = '<div class="table-view"><table class="data-table">';
  html += '<thead><tr><th width="80">时间</th><th width="120">角色</th><th>内容预览</th><th width="100">操作</th></tr></thead><tbody>';
  detail.segments.forEach((segment) => {
    const label = segment.role?.scene_type_label || '不确定';
    const config = ROLES[label] || ROLES['不确定'];
    html += `<tr>
      <td class="td-time">${escapeHtml(segment.time)}</td>
      <td><span style="color:${config.color};font-size:12px;font-weight:600">${config.emoji} ${escapeHtml(label)}</span></td>
      <td class="td-summary">${escapeHtml(plainText(segment.preview || segment.text || ''))}</td>
      <td><button class="raw-btn" type="button" onclick="switchView('timeline'); scrollToSegment('${escapeHtml(segment.time)}')">👉 跳转</button></td>
    </tr>`;
  });
  html += '</tbody></table></div>';
  node.innerHTML = html;
}

function renderChartsView() {
  const node = document.getElementById('view-charts');
  if (!node) return;
  node.innerHTML = `<div class="charts-grid">
    <div class="chart-card"><h3>🎭 角色分布</h3><canvas id="chartRoles"></canvas></div>
    <div class="chart-card"><h3>🕒 时段热度</h3><canvas id="chartTime"></canvas></div>
  </div>`;
}

function initCharts() {
  if (!state.currentData) return;
  state.chartInstances.forEach((chart) => chart.destroy());
  state.chartInstances = [];

  const roleCounts = {};
  state.currentData.segments.forEach((segment) => {
    const key = segment.role?.addressed_to || '未识别';
    roleCounts[key] = (roleCounts[key] || 0) + 1;
  });

  const roleCanvas = document.getElementById('chartRoles');
  if (roleCanvas) {
    state.chartInstances.push(new Chart(roleCanvas, {
      type: 'doughnut',
      data: {
        labels: Object.keys(roleCounts),
        datasets: [{
          data: Object.values(roleCounts),
          backgroundColor: Object.keys(roleCounts).map((key) => {
            const color = getRoleStyle(key).color;
            return color.startsWith('#') ? color : '#9b9a97';
          }),
        }],
      },
      options: { plugins: { legend: { position: 'bottom' } }, maintainAspectRatio: false },
    }));
  }

  const timeCounts = {};
  state.currentData.segments.forEach((segment) => {
    const hour = `${String(segment.time).split(':')[0]}:00`;
    timeCounts[hour] = (timeCounts[hour] || 0) + plainText(segment.text || '').length;
  });

  const timeCanvas = document.getElementById('chartTime');
  if (timeCanvas) {
    const sortedHours = Object.keys(timeCounts).sort();
    state.chartInstances.push(new Chart(timeCanvas, {
      type: 'bar',
      data: {
        labels: sortedHours,
        datasets: [{
          label: '字数',
          data: sortedHours.map((hour) => timeCounts[hour]),
          backgroundColor: '#2eaadc',
          borderRadius: 4,
        }],
      },
      options: { plugins: { legend: { display: false } }, maintainAspectRatio: false },
    }));
  }
}

function optionMarkup(items, getter) {
  if (!items || !items.length) {
    return '<option value="">暂无可选项</option>';
  }
  return items.map((item) => {
    const value = getter(item);
    return `<option value="${escapeHtml(value)}">${escapeHtml(value)}</option>`;
  }).join('');
}

  const node = document.getElementById('view-corrections');
  if (!node) return;

  node.innerHTML = `
    <div class="briefing-grid">
      <div class="briefing-card">
        <div class="briefing-card-title">✏️ 错词校正</div>
        <div class="form-stack">
          <div>
            <label class="form-label" for="typoWrong">原文</label>
            <input id="typoWrong" class="field-input" type="text" placeholder="原来识别错的文本">
          </div>

          </div>

          </div>
          <div class="inline-actions">
            <button class="action-btn" type="button" data-op="close_loop" onclick="submitContextAction('/api/context/loops/close', { query: document.getElementById('closeLoopSelect').value, status: 'done' }, '已标记完成')">标记完成</button>
            <button class="action-btn" type="button" data-op="reject_loop" onclick="submitContextAction('/api/context/loops/reject', { query: document.getElementById('closeLoopSelect').value }, '已设为不再跟进')">不再跟进</button>
          </div>
        </div>
      </div>

      <div class="briefing-card">
        <div class="briefing-card-title">📁 项目整理</div>

            <select id="mergeProjectSource" class="field-select">${optionMarkup(state.projects, (item) => item.title || item.project_id)}</select>

          </div>
          <div class="inline-actions">
            <button class="action-btn" type="button" data-op="merge_project" onclick="submitContextAction('/api/context/projects/merge', { source: document.getElementById('mergeProjectSource').value, target: document.getElementById('mergeProjectTarget').value }, '已合并项目')">合并项目</button>
            <button class="action-btn" type="button" data-op="reject_project" onclick="submitContextAction('/api/context/projects/reject', { query: document.getElementById('mergeProjectSource').value }, '已从项目中移出')">移出项目</button>
          </div>
        </div>
      </div>

      <div class="briefing-card">
        <div class="briefing-card-title">🧠 决策整理</div>
        <div class="form-stack">
          <div>
            <label class="form-label" for="rejectDecisionSelect">决策</label>
            <select id="rejectDecisionSelect" class="field-select">${optionMarkup(state.decisions, (item) => item.decision || item.topic || item.decision_id)}</select>
          </div>
          <div class="inline-actions">
            <button class="action-btn" type="button" data-op="reject_decision" onclick="submitContextAction('/api/context/decisions/reject', { query: document.getElementById('rejectDecisionSelect').value }, '已移出决策')">移出决策</button>
          </div>
        </div>
      </div>

      <div class="briefing-card briefing-card-full">
        <div class="briefing-card-title">📚 当前词典</div>
        ${renderEventList(
          state.corrections,
          (item) => `<div class="event-item"><strong>${escapeHtml(item.wrong)} → ${escapeHtml(item.right)}</strong><br>${escapeHtml(plainText(item.context || '暂无上下文'))}</div>`,
          '校正规则还没有内容。'
        )}
      </div>
    </div>
  `;
}

function renderPipelineView() {
  const node = document.getElementById('view-pipeline');
  if (!node) return;

  const detail = state.selectedJobDetail;
  node.innerHTML = `
    <div class="briefing-grid">
      <div class="briefing-card">
        <div class="briefing-card-title">⚙️ 流程操作</div>
        <div class="form-stack">
          <div>
            <label class="form-label" for="pipelineDateInput">目标日期</label>
            <input id="pipelineDateInput" class="field-input" type="text" value="${escapeHtml(state.currentDate || '')}" placeholder="YYYY-MM-DD（默认当前日期）">
          </div>
          <div class="inline-actions">
            <button class="action-btn primary" type="button" onclick="createPipelineJob('context')">刷新上下文</button>
            <button class="action-btn" type="button" onclick="createPipelineJob('clean')">清理文本</button>
            <button class="action-btn" type="button" onclick="createPipelineJob('roles')">识别对象</button>
            <button class="action-btn" type="button" onclick="createPipelineJob('distill')">整理摘要</button>
            <button class="action-btn" type="button" onclick="createPipelineJob('briefing')">生成日报</button>
            <button class="action-btn" type="button" onclick="createPipelineJob('run')">重新运行</button>
          </div>
        </div>
      </div>

      <div class="briefing-card">
        <div class="briefing-card-title">📝 流程说明</div>
        <div class="event-item"><code>刷新上下文</code> 不需要日期，其它流程默认使用当前选中的日期。</div>
        <div class="event-item">任务完成后会自动轮询，并刷新当前日期的数据。</div>
        <div class="event-item"><button class="action-btn" type="button" onclick="refreshPipelineJobs()">刷新列表</button></div>
      </div>
    </div>

    <div class="pipeline-layout">
      <div class="job-card">
        <div class="briefing-card-title">🗂️ 最近运行</div>
        <div id="pipelineJobsList" class="search-stack">
          ${renderEventList(
            state.jobs,
            (job) => `<button class="job-item ${job.job_id === state.selectedJobId ? 'active' : ''}" type="button" onclick="loadPipelineJobDetail('${escapeHtml(job.job_id)}')">
              <strong>${escapeHtml(formatPipelineKind(job.kind))}</strong>
              <div class="muted">${escapeHtml(job.target_date || '全局')} · ${escapeHtml(formatPipelineStatus(job.status))}</div>
            </button>`,
            '还没有运行记录。'
          )}
        </div>
      </div>

      <div class="job-card">
        <div class="briefing-card-title">📜 运行详情</div>
        <div id="pipelineJobDetail">
          ${detail ? `
            <div class="event-item"><strong>流程</strong><br>${escapeHtml(formatPipelineKind(detail.kind))}</div>
            <div class="event-item"><strong>状态</strong><br>${escapeHtml(formatPipelineStatus(detail.status))}</div>
            <div class="event-item"><strong>当前步骤</strong><br>${escapeHtml(formatPipelineStep(detail.current_step))}</div>
            <div class="event-item"><strong>结果文件</strong><br>${escapeHtml((detail.artifacts || []).join(' / ') || '暂无')}</div>
            <pre class="job-log">${escapeHtml((detail.log_lines || []).join('\n') || '暂无日志')}</pre>
          ` : renderEmptyState('选择一条运行记录查看详情。')}
        </div>
      </div>
    </div>
  `;
}

function switchView(viewName) {
  state.currentView = viewName;
  document.querySelectorAll('.view-tab').forEach((node) => {
    node.classList.toggle('active', node.id === `tab-${viewName}`);
  });
  document.querySelectorAll('.view-content').forEach((node) => {
    node.classList.toggle('active', node.id === `view-${viewName}`);
  });
  const filterBar = document.getElementById('filter-bar');
  if (filterBar) {
    filterBar.style.display = viewName === 'timeline' ? 'flex' : 'none';
  }
  if (viewName === 'charts') {
    setTimeout(initCharts, 50);
  }
}

function toggleRawText(button) {
  const rawNode = button.parentElement.nextElementSibling;
  const visible = !rawNode.classList.contains('visible');
  rawNode.classList.toggle('visible', visible);
  button.innerHTML = visible ? '🙈 隐藏原文' : '👁️ 显示原文';
  button.style.color = visible ? '#fff' : 'var(--text-secondary)';
  button.style.background = visible ? 'var(--text)' : 'var(--bg-sidebar)';
}

function filterRole(role) {
  if (role === 'all') {
    state.activeFilters.clear();
  } else if (state.activeFilters.has(role)) {
    state.activeFilters.delete(role);
  } else {
    state.activeFilters.add(role);
  }

  document.querySelectorAll('.role-tag').forEach((button) => {
    if (button.dataset.role === 'all') {
      button.classList.toggle('active', state.activeFilters.size === 0);
    } else {
      button.classList.toggle('active', state.activeFilters.has(button.dataset.role));
    }
  });

  document.querySelectorAll('#view-timeline .tl-node').forEach((node) => {
    if (state.activeFilters.size === 0) {
      node.classList.remove('hidden');
      return;
    }
    let matched = false;
    if (state.activeFilters.has('needs_review') && node.dataset.needsReview === 'true') matched = true;
    if (state.activeFilters.has(node.dataset.role)) matched = true;
    node.classList.toggle('hidden', !matched);
  });
}

function scrollToSegment(time) {
  const nodes = Array.from(document.querySelectorAll('[data-segment-time]'));
  const target = nodes.find((node) => node.dataset.segmentTime === time);
  if (!target) return;
  target.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

async function refreshCorrectionsFeed() {
  const payload = await fetchJson('/api/corrections', { corrections: [] });
  state.corrections = payload.corrections || [];
  if (document.getElementById('view-corrections')) {
    renderCorrectionsView();
  }
}

async function submitTypoCorrection() {
  const wrong = document.getElementById('typoWrong')?.value.trim() || '';
  const right = document.getElementById('typoRight')?.value.trim() || '';
  const context = document.getElementById('typoContext')?.value.trim() || '';
  if (!wrong || !right) {
    showToast('原文和改成内容都不能为空');
    return;
  }
  try {
    await postJson('/api/correct/typo', {
      wrong,
      right,
      context,
      date: state.currentDate,
      sync_vocab: true,
    });
    showToast(`已保存校正：${wrong} → ${right}`);
    await refreshCorrectionsFeed();
    if (state.currentDate) {
      await loadDate(state.currentDate);
      switchView('corrections');
    }
  } catch (error) {
    showToast(error.message);
  }
}

async function submitContextAction(url, payload, successMessage) {
  try {
    await postJson(url, payload);
    showToast(successMessage);
    await loadContext();
    renderCorrectionsView();
    renderOverviewView();
  } catch (error) {
    showToast(error.message);
  }
}

async function runSearch(explicitQuery = null) {
  const query = explicitQuery !== null ? explicitQuery : document.getElementById('searchInput').value.trim();
  if (!query) {
    state.searchResults = [];
    if (document.getElementById('view-overview')) renderOverviewView();
    return;
  }
  state.searchResults = await fetchJson(`/api/search?q=${encodeURIComponent(query)}`, []);
  if (document.getElementById('view-overview')) {
    renderOverviewView();
  }
  switchView('overview');
}

async function createPipelineJob(kind) {
  const explicitDate = document.getElementById('pipelineDateInput')?.value.trim() || '';
  const payload = { kind };
  if (kind !== 'context') {
    payload.target_date = explicitDate || state.currentDate || '';
  }

  try {
    const job = await postJson('/api/pipeline/jobs', payload);
    state.selectedJobId = job.job_id;
    showToast(`已开始：${formatPipelineKind(kind)}`);
    await refreshPipelineJobs();
    switchView('pipeline');
  } catch (error) {
    showToast(error.message);
  }
}

async function refreshPipelineJobs() {
  state.jobs = await fetchJson('/api/pipeline/jobs', []);
  if (state.selectedJobId && !state.jobs.find((job) => job.job_id === state.selectedJobId)) {
    state.selectedJobId = '';
    state.selectedJobDetail = null;
  }
  if (!state.selectedJobId && state.jobs.length) {
    state.selectedJobId = state.jobs[0].job_id;
  }
  if (state.selectedJobId) {
    await loadPipelineJobDetail(state.selectedJobId, false);
  }
  if (document.getElementById('view-pipeline')) {
    renderPipelineView();
  }
}

async function loadPipelineJobDetail(jobId, rerender = true) {
  const detail = await fetchJson(`/api/pipeline/jobs/${jobId}`, null);
  if (!detail) return;
  state.selectedJobId = jobId;
  state.selectedJobDetail = detail;

  if (detail.status === 'succeeded' && !state.handledCompletedJobs.has(detail.job_id)) {
    state.handledCompletedJobs.add(detail.job_id);
    await handleJobCompletion(detail);
  }

  if (rerender && document.getElementById('view-pipeline')) {
    renderPipelineView();
  }
}

async function handleJobCompletion(job) {
  if (job.kind === 'context') {
    await loadContext();
    showToast('上下文已刷新');
    return;
  }
  if (job.target_date && job.target_date === state.currentDate) {
    await loadDate(state.currentDate);
    showToast(`${formatPipelineKind(job.kind)}已完成，并已刷新当前日期`);
  }
}

init();
</script>
</body>
</html>
