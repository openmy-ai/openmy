[project]
name = "openmy"
version = "0.2.0"
description = "OpenMy — 个人上下文引擎"
requires-python = ">=3.10"
dependencies = [
    "google-genai>=1.12.1",
    "rich>=13.0",
    "watchdog>=4.0.0",
]

[project.scripts]
openmy = "openmy.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/openmy"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
