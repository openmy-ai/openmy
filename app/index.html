<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenMy</title>
<meta name="description" content="个人每日上下文工作台">
<link rel="icon" href="/static/icons/logo.svg" type="image/svg+xml">
<script>
  (() => {
    const theme = localStorage.getItem('openmy-theme') || 'light';
    const html = document.documentElement;
    if (theme === 'auto') {
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      html.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
    } else {
      html.setAttribute('data-theme', theme);
    }
  })();
</script>

<link rel="stylesheet" href="/static/style.css">
<script src="/static/vendor/chart.umd.js"></script>
<script src="/static/app.js" defer></script>
</head>
<body>
<div class="app">
  <button class="mobile-sidebar-toggle" type="button" aria-label="打开日期导航" onclick="toggleSidebar()">
    <span></span><span></span><span></span>
  </button>
  <div class="sidebar-backdrop" onclick="closeSidebar()"></div>
  <aside class="sidebar" role="navigation" aria-label="日期导航">
    <div class="logo" onclick="state.showWikiHome=false;renderHomePage()" role="button" tabindex="0">
      <div class="logo-title"><img class="logo-mark" src="/static/icons/logo.svg" alt=""><span>OpenMy</span></div>
      <div class="logo-sub">每日上下文</div>
    </div>
    <div class="search-box">
      <button class="sidebar-search-btn" onclick="openSpotlight()" aria-label="打开搜索">
        <span class="sidebar-search-label"><img class="sidebar-icon" src="/static/icons/search.svg" alt=""><span>搜索...</span></span>
        <kbd>⌘K</kbd>
      </button>
    </div>
    <div class="stats" id="stats"></div>
    <div class="report-links">
      <button class="report-btn" id="homeBtn" onclick="state.showWikiHome=false;renderHomePage()">首页</button>
      <button class="report-btn" id="weeklyBtn" onclick="renderWeeklyReport()">周报</button>
      <button class="report-btn" id="monthlyBtn" onclick="renderMonthlyReport()">月报</button>
    </div>
    <div class="divider"></div>
    <div class="section-label">日期</div>
    <div class="date-list" id="dateList"></div>
    <div class="divider"></div>
    <button class="sidebar-model-btn" id="transcriptionBtn" onclick="openSettings('transcription')" aria-label="打开转写模型设置"><img class="sidebar-icon" src="/static/icons/transcription.svg" alt=""><span>转写模型</span></button>
    <div class="sidebar-dict" id="sidebarDict">
      <button class="sidebar-dict-toggle" onclick="toggleSidebarDict()">
        <span>校正词典 <span class="dict-count" id="dictCount">0</span></span>
        <span class="dict-arrow">▼</span>
      </button>
      <div class="sidebar-dict-list" id="sidebarDictList"></div>
    </div>
    <div class="sidebar-footer">
      <button class="sidebar-settings-btn" id="settingsBtn" onclick="openSettings()" aria-label="打开设置"><img class="sidebar-icon" src="/static/icons/settings.svg" alt=""><span>设置</span></button>
    </div>
  </aside>

  <main class="main" id="main"></main>
</div>

<div class="spotlight-overlay" id="spotlightOverlay" role="dialog" aria-modal="true" onclick="closeSpotlight(event)">
  <div class="spotlight-modal" onclick="event.stopPropagation()">
    <div class="spotlight-input-wrapper">
      <span class="spotlight-icon"><img class="sidebar-icon" src="/static/icons/search.svg" alt=""></span>
      <input type="text" id="spotlightInput" class="spotlight-input" placeholder="搜索所有日期、屏幕和录音..." autocomplete="off">
    </div>
    <div class="spotlight-results" id="spotlightResults"></div>
  </div>
</div>

<div class="spotlight-overlay" id="settingsOverlay" role="dialog" aria-modal="true" onclick="closeSettingsOverlay(event)">
  <div class="spotlight-modal" style="max-height:85vh;overflow-y:auto;padding:0;background:var(--bg);" onclick="event.stopPropagation()">
    <div id="settingsContent" style="padding:16px;"></div>
  </div>
</div>

<div id="globalJobIndicator" style="display:none;position:fixed;top:20px;right:20px;background:var(--accent);color:white;padding:10px 16px;border-radius:30px;font-size:13px;font-weight:600;box-shadow:var(--shadow-hover);z-index:9999;align-items:center;gap:10px;cursor:pointer;transition:all 0.3s ease;animation: fadeUp 0.3s ease" onclick="openSettings()">
  <span style="width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;display:inline-block;animation:spin 1s linear infinite;"></span>
  <span id="globalJobText">AI 正在分析中...</span>
</div>

<div class="toast" id="toast"></div>

<div class="drawer-backdrop" id="correctionPopover" onclick="if(event.target===this) closeCorrectionPopover()">
  <div class="correction-drawer" role="dialog" aria-modal="true" aria-label="纠错抽屉">
    <div class="cp-header cp-header-drawer">
      <div>
        <div class="cp-title">智能纠错</div>
        <div class="cp-subtitle">把错词改掉，顺手留下更像人话的版本</div>
      </div>
      <button class="cp-close" onclick="closeCorrectionPopover()">关闭</button>
    </div>
    <div class="cp-body">
      <div class="cp-block">
        <div class="cp-label">选中的原词</div>
        <div class="cp-wrong" id="cpWrongText"></div>
      </div>
      <div class="cp-block">
        <div class="cp-label">原句参考</div>
        <div class="cp-context" id="cpContextText">先在日报里选中一段文字，再来纠正。</div>
      </div>
      <div class="cp-block">
        <div class="cp-label">你想改成什么</div>
        <input class="cp-input" id="cpRightInput" placeholder="改成更准的说法" autocomplete="off">
      </div>
      <div class="cp-actions">
        <button class="action-btn" type="button" onclick="closeCorrectionPopover()">先不改</button>
        <button class="cp-submit" type="button" onclick="submitInlineCorrection()">保存这次纠正</button>
      </div>
    </div>
  </div>
</div>

</body>
</html>
