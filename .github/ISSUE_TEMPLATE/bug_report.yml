name: Bug report
description: Report a reproducible problem in OpenMy
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the bug in one or two sentences.
      placeholder: What broke?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Provide the exact steps so someone else can reproduce the issue.
      placeholder: |
        1. Run ...
        2. Open ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What happened instead?
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: macOS 15.4 / Ubuntu 24.04 / Windows 11
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.11.9"
    validations:
      required: true
  - type: input
    id: openmy
    attributes:
      label: OpenMy version / commit
      placeholder: v0.2.0 / git rev-parse --short HEAD
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs, screenshots, or extra context
      description: Paste any relevant output here.
