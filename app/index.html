<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenMy</title>
<meta name="description" content="个人每日上下文浏览器">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
  --bg: #ffffff;
  --bg-hover: #f7f7f5;
  --bg-active: #f0f0ee;
  --bg-sidebar: #fbfbfa;
  --bg-tag: #f0f0ee;
  --text: #37352f;
  --text-secondary: #787774;
  --text-light: #9b9a97;
  --border: #e9e9e7;
  --accent: #2eaadc;
  --accent-light: #e8f4f8;

  --role-ai: #529cca;
  --role-ai-bg: #e8f4f8;
  --role-merchant: #d9730d;
  --role-merchant-bg: #fdecc8;
  --role-pet: #e255a1;
  --role-pet-bg: #fce2db;
  --role-self: #9065b0;
  --role-self-bg: #e8deee;
  --role-interpersonal: #0f7b6c;
  --role-interpersonal-bg: #dbeddb;
  --role-uncertain: #9b9a97;
  --role-uncertain-bg: #f0f0ee;

  --radius: 6px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-serif: 'Noto Serif SC', Georgia, serif;
  --transition: 0.15s ease;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

.app { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }

/* ── 侧边栏 ── */
.sidebar {
  background: var(--bg-sidebar); border-right: 1px solid var(--border);
  padding: 20px 12px; overflow-y: auto; position: sticky; top: 0; height: 100vh;
  display: flex; flex-direction: column;
}
.logo { padding: 4px 8px; margin-bottom: 2px; }
.logo-title { font-family: var(--font-serif); font-size: 15px; font-weight: 700; }
.logo-sub { font-size: 11px; color: var(--text-light); margin-top: 1px; }
.search-box { padding: 0 4px; margin: 12px 0; }
.search-box input {
  width: 100%; padding: 6px 10px; background: var(--bg);
  border: 1px solid var(--border); border-radius: var(--radius);
  color: var(--text); font-size: 13px; font-family: var(--font-body);
  outline: none; transition: border var(--transition), box-shadow var(--transition);
}
.search-box input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-light); }
.stats { padding: 8px 12px; font-size: 12px; color: var(--text-secondary); display: flex; gap: 12px; }
.stat-item { display: flex; align-items: center; gap: 3px; }
.stat-num { font-weight: 600; color: var(--text); }
.mini-role-bar { display: flex; height: 3px; border-radius: 2px; overflow: hidden; margin: 4px 12px 8px; gap: 1px; }
.mini-role-bar div { height: 100%; min-width: 3px; border-radius: 1px; }
.role-legend-mini { padding: 0 12px 8px; display: flex; flex-wrap: wrap; gap: 4px 8px; }
.role-legend-mini span { font-size: 10px; color: var(--text-light); display: flex; align-items: center; gap: 3px; }
.role-legend-mini .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
.divider { height: 1px; background: var(--border); margin: 4px 12px 8px; }
.section-label { font-size: 11px; font-weight: 600; color: var(--text-light); padding: 4px 12px; text-transform: uppercase; }
.date-list { flex: 1; overflow-y: auto; margin-top: 4px; }
.date-item {
  display: flex; align-items: center; gap: 8px; padding: 5px 12px;
  border-radius: var(--radius); cursor: pointer; transition: background var(--transition);
  font-size: 14px; color: var(--text-secondary);
}
.date-item:hover { background: var(--bg-hover); }
.date-item.active { background: var(--bg-active); color: var(--text); font-weight: 500; }
.date-item .icon { font-size: 14px; opacity: 0.6; }
.date-item .meta { margin-left: auto; font-size: 11px; color: var(--text-light); }

/* ── 主内容区 ── */
.main { max-width: 900px; margin: 0 auto; padding: 40px 48px 80px; width: 100%; }
.page-header { margin-bottom: 32px; }
.page-icon { font-size: 36px; margin-bottom: 8px; }
.page-title { font-family: var(--font-serif); font-size: 32px; font-weight: 700; line-height: 1.2; }
.page-meta { font-size: 13px; color: var(--text-light); margin-top: 6px; display: flex; gap: 16px; }

.view-tabs { display: flex; gap: 8px; margin-bottom: 24px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
.view-tab {
  padding: 6px 16px; border: none; background: transparent; color: var(--text-secondary);
  font-size: 14px; font-weight: 500; cursor: pointer; border-radius: var(--radius);
  transition: all var(--transition);
}
.view-tab:hover { background: var(--bg-hover); color: var(--text); }
.view-tab.active { background: var(--bg-active); color: var(--text); font-weight: 600; }
.view-content { display: none; }
.view-content.active { display: block; }

.role-tags { display: flex; flex-wrap: wrap; gap: 6px; margin: 0 0 24px; }
.role-tag {
  display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px;
  border-radius: 4px; font-size: 12px; cursor: pointer; border: none;
  font-family: var(--font-body); transition: opacity var(--transition); opacity: 0.7;
}
.role-tag:hover { opacity: 1; }
.role-tag.active { opacity: 1; font-weight: 600; }

.callout { background: var(--bg-hover); border-radius: var(--radius); padding: 16px 18px; margin-bottom: 28px; display: flex; gap: 12px; }
.callout-icon { font-size: 20px; flex-shrink: 0; }
.callout-body { font-size: 14px; color: var(--text); flex: 1; }

/* Props 三栏元数据卡片 */
.props-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; margin-bottom: 24px; }
.prop-card { background: var(--bg-sidebar); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
.prop-card-title { font-size: 12px; font-weight: 700; color: var(--text-light); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; text-transform: uppercase; }
.prop-card-title .dot { width: 8px; height: 8px; border-radius: 50%; }
.prop-item { font-size: 13px; color: var(--text-secondary); padding: 4px 0; border-bottom: 1px dashed var(--border); line-height: 1.5; }
.prop-item:last-child { border-bottom: none; }
.prop-item .time-tag { font-size: 11px; color: var(--text-light); font-variant-numeric: tabular-nums; margin-right: 4px; }
.prop-item .project-tag { font-size: 10px; padding: 1px 5px; border-radius: 3px; background: var(--accent-light); color: var(--accent); font-weight: 500; margin-right: 4px; }
.prop-count { font-size: 11px; color: var(--text-light); font-weight: 400; }

/* ── 树形时间轴 ── */
.timeline { position: relative; padding-left: 80px; }
.timeline::before { content: ''; position: absolute; left: 60px; top: 0; bottom: 0; width: 2px; background: var(--border); }
.tl-node { position: relative; padding: 0 0 32px 32px; }
.tl-node.hidden { display: none; }
.tl-node:last-child { padding-bottom: 0; }
.tl-node:last-child::after { content: ''; position: absolute; left: -22px; top: 14px; bottom: 0; width: 2px; background: var(--bg); z-index: 1; }
.tl-dot { position: absolute; left: -26px; top: 6px; width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--border); background: var(--bg); z-index: 2; transition: all 0.2s; }
.tl-node:hover .tl-dot { transform: scale(1.3); box-shadow: 0 0 0 4px rgba(46,170,220,0.15); }
.tl-time { position: absolute; left: -80px; top: 3px; width: 50px; text-align: right; font-size: 13px; font-weight: 700; font-variant-numeric: tabular-nums; color: var(--text-light); }
.tl-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 18px; transition: box-shadow 0.2s, border-color 0.2s; }
.tl-node:hover .tl-card { box-shadow: var(--shadow); border-color: #d0d0ce; }
.tl-role-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
.role-label { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.role-label.needs-review { outline: 2px dashed #d9730d; outline-offset: 1px; }
.addressed-to { font-size: 11px; color: var(--text-secondary); background: var(--bg-sidebar); border: 1px solid var(--border); padding: 2px 8px; border-radius: 10px; font-weight: 500; }
.addressed-to .addr-icon { margin-right: 2px; }
.seg-distilled { font-size: 15px; line-height: 1.7; margin-bottom: 10px; color: var(--text); }
.seg-distilled-placeholder { font-size: 14px; color: var(--text-secondary); font-style: italic; background: var(--bg-sidebar); padding: 8px 12px; border-radius: 4px; border-left: 3px solid var(--border); }
.raw-controls { display: flex; justify-content: flex-end; }
.raw-btn {
  background: var(--bg-sidebar); border: 1px solid var(--border); padding: 4px 10px;
  border-radius: 4px; font-size: 12px; color: var(--text-secondary); cursor: pointer;
  display: inline-flex; align-items: center; gap: 4px; transition: all var(--transition);
}
.raw-btn:hover { background: var(--border); color: var(--text); }
.seg-raw {
  margin-top: 12px; padding: 16px; background: var(--bg-sidebar);
  border-radius: var(--radius); font-size: 14px; line-height: 1.8; color: var(--text-secondary);
  border: 1px dashed var(--border); display: none;
}
.seg-raw.visible { display: block; }
.seg-raw p { margin-bottom: 12px; }
.seg-raw p:last-child { margin-bottom: 0; }

/* 数据表格 */
.table-view { width: 100%; overflow-x: auto; }
.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table th, .data-table td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); }
.data-table th { background: var(--bg-sidebar); font-weight: 600; color: var(--text-light); }
.data-table tr:hover { background: var(--bg-hover); }
.data-table .td-time { font-variant-numeric: tabular-nums; font-weight: 500; }
.data-table .td-summary { color: var(--text); max-width: 400px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* 图表 */
.charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.chart-card { background: var(--bg-sidebar); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
.chart-card h3 { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: var(--text); }
.chart-card canvas { max-height: 260px; }
.chart-full { grid-column: 1 / -1; }

/* ── Briefing 仪表盘 ── */
.briefing-banner {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  border-radius: 12px; padding: 24px 28px; margin-bottom: 24px; color: #fff;
  position: relative; overflow: hidden;
}
.briefing-banner::after {
  content: ''; position: absolute; top: -30%; right: -10%; width: 200px; height: 200px;
  background: rgba(255,255,255,0.08); border-radius: 50%;
}
.briefing-banner h2 { font-family: var(--font-serif); font-size: 20px; font-weight: 700; margin-bottom: 6px; }
.briefing-summary { font-size: 14px; opacity: 0.92; line-height: 1.6; }
.briefing-stats-row { display: flex; gap: 24px; margin-top: 14px; }
.briefing-stat { display: flex; flex-direction: column; }
.briefing-stat-num { font-size: 22px; font-weight: 700; }
.briefing-stat-label { font-size: 11px; opacity: 0.75; }

.briefing-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
@media (max-width: 720px) { .briefing-grid { grid-template-columns: 1fr; } }
.briefing-card {
  background: var(--bg-sidebar); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 18px 20px; transition: box-shadow 0.2s;
}
.briefing-card:hover { box-shadow: var(--shadow); }
.briefing-card-title {
  font-size: 13px; font-weight: 700; color: var(--text-light); margin-bottom: 12px;
  display: flex; align-items: center; gap: 6px; text-transform: uppercase;
}
.briefing-card-full { grid-column: 1 / -1; }

.time-block {
  display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px dashed var(--border);
  align-items: flex-start;
}
.time-block:last-child { border-bottom: none; padding-bottom: 0; }
.tb-period {
  font-size: 12px; font-weight: 700; color: var(--accent); white-space: nowrap;
  min-width: 56px; padding-top: 2px;
}
.tb-body { flex: 1; }
.tb-summary { font-size: 14px; color: var(--text); line-height: 1.6; margin-bottom: 6px; }
.tb-tags { display: flex; flex-wrap: wrap; gap: 4px; }
.tb-tag {
  font-size: 10px; padding: 2px 8px; border-radius: 10px;
  display: inline-flex; align-items: center; gap: 3px;
}
.tb-tag-person { background: #f0f9ff; color: #0369a1; }
.tb-tag-app { background: #f0fdf4; color: #15803d; }
.tb-mode-badge {
  font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: 600;
  margin-left: 6px; vertical-align: middle;
}
.tb-mode-dual { background: #dbeafe; color: #1d4ed8; }
.tb-mode-voice { background: #f0f0ee; color: #787774; }

.event-item {
  font-size: 13px; color: var(--text-secondary); padding: 6px 0;
  border-bottom: 1px dashed var(--border); line-height: 1.5;
}
.event-item:last-child { border-bottom: none; }
.event-icon { margin-right: 4px; }

.people-grid { display: flex; flex-wrap: wrap; gap: 10px; }
.people-chip {
  display: flex; align-items: center; gap: 8px;
  background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
  padding: 10px 14px; min-width: 140px;
}
.people-avatar {
  width: 32px; height: 32px; border-radius: 50%; display: flex;
  align-items: center; justify-content: center; font-size: 16px;
}
.people-info { flex: 1; }
.people-name { font-size: 13px; font-weight: 600; color: var(--text); }
.people-meta { font-size: 11px; color: var(--text-light); }

.app-bar-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; }
.app-bar-name { font-size: 12px; font-weight: 500; color: var(--text); min-width: 80px; }
.app-bar-track { flex: 1; height: 8px; background: var(--bg-active); border-radius: 4px; overflow: hidden; }
.app-bar-fill { height: 100%; background: linear-gradient(90deg, #667eea, #764ba2); border-radius: 4px; transition: width 0.6s ease; }
.app-bar-duration { font-size: 11px; color: var(--text-light); min-width: 60px; text-align: right; }

/* 屏幕佐证徽章（时间轴卡片内） */
.screen-badge {
  display: inline-flex; align-items: center; gap: 3px;
  font-size: 10px; padding: 2px 8px; border-radius: 10px;
  background: #eff6ff; color: #3b82f6; font-weight: 500;
}
.screen-badge .sb-icon { font-size: 11px; }

/* 搜索 */
.search-header { font-size: 15px; font-weight: 600; margin-bottom: 16px; color: var(--text); }
.search-result { padding: 14px 16px; border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; cursor: pointer; transition: all var(--transition); }
.search-result:hover { box-shadow: var(--shadow); border-color: var(--accent); }
.sr-meta { font-size: 12px; color: var(--text-light); margin-bottom: 6px; }
.sr-context { font-size: 14px; line-height: 1.6; }
.sr-context mark { background: #fef3c7; color: var(--text); padding: 0 2px; border-radius: 2px; }

/* 空状态 */
.empty { text-align: center; padding: 120px 40px 80px; color: var(--text-light); }
.empty .icon { font-size: 40px; margin-bottom: 12px; }

@keyframes highlight-flash {
  0% { box-shadow: 0 0 0 4px #ffedb8; border-color: #f5c43d; }
  100% { box-shadow: 0 0 0 0 transparent; }
}
.highlight-target { animation: highlight-flash 2.5s ease-out; }

/* ── 纠错弹框 ── */
.correct-btn {
  position: fixed; display: none; padding: 4px 10px;
  background: var(--text); color: #fff; border: none; border-radius: 4px;
  font-size: 12px; cursor: pointer; z-index: 1000; box-shadow: var(--shadow);
}
.correct-btn:hover { opacity: 0.85; }
.correct-modal {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.3); z-index: 2000; align-items: center; justify-content: center;
}
.correct-modal.visible { display: flex; }
.correct-dialog { background: #fff; border-radius: 12px; padding: 28px 32px; width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.15); }
.correct-dialog h3 { font-size: 16px; font-weight: 600; margin-bottom: 20px; }
.correct-field { margin-bottom: 16px; }
.correct-field label { display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; font-weight: 500; }
.correct-field input {
  width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius);
  font-size: 14px; font-family: var(--font-body); outline: none; transition: border-color var(--transition);
}
.correct-field input:focus { border-color: var(--accent); }
.correct-field .wrong-text { padding: 10px 12px; background: #fff0f0; border: 1px solid #fecaca; border-radius: var(--radius); color: #dc2626; font-size: 14px; text-decoration: line-through; }
.correct-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
.correct-actions button { padding: 8px 20px; border-radius: var(--radius); border: 1px solid var(--border); background: #fff; cursor: pointer; font-size: 13px; transition: all var(--transition); }
.correct-actions .btn-submit { background: var(--text); color: #fff; border-color: var(--text); }
.correct-actions .btn-submit:hover { opacity: 0.85; }
.correct-actions .btn-cancel:hover { background: var(--bg-hover); }
.correct-toast {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
  background: var(--text); color: #fff; padding: 10px 24px; border-radius: 20px;
  font-size: 13px; z-index: 3000; opacity: 0; transition: opacity 0.3s; pointer-events: none;
}
.correct-toast.visible { opacity: 1; }

</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-title">📓 OpenMy</div>
      <div class="logo-sub">Daily Context</div>
    </div>
    <div class="search-box"><input type="text" id="searchInput" placeholder="全局搜索..." /></div>
    <div class="stats" id="stats"></div>
    <div class="mini-role-bar" id="globalBar"></div>
    <div class="role-legend-mini" id="globalLegend"></div>
    <div class="divider"></div>
    <div class="section-label">日期</div>
    <div class="date-list" id="dateList"></div>
  </aside>

  <main class="main" id="main">
    <div class="empty" id="emptyState">
      <div class="icon">📓</div>
      <p>从左侧选择日期开始浏览</p>
    </div>
  </main>
</div>

<!-- 纠错浮动按钮 -->
<button class="correct-btn" id="correctBtn" onclick="openCorrectionModal()">✏️ 纠正</button>

<!-- 纠错弹框 -->
<div class="correct-modal" id="correctModal">
  <div class="correct-dialog">
    <h3>✏️ 纠正转写错误</h3>
    <div class="correct-field">
      <label>原文（错误）</label>
      <div class="wrong-text" id="correctWrong"></div>
    </div>
    <div class="correct-field">
      <label>正确写法</label>
      <input type="text" id="correctRight" placeholder="输入正确的文字..." />
    </div>
    <div class="correct-field">
      <label>备注（可选）</label>
      <input type="text" id="correctContext" placeholder="例如：宠物名字、人名、专业术语..." />
    </div>
    <div class="correct-actions">
      <button class="btn-cancel" onclick="closeCorrectionModal()">取消</button>
      <button class="btn-submit" onclick="submitCorrection()">确认纠正</button>
    </div>
  </div>
</div>
<div class="correct-toast" id="correctToast"></div>

<script>
// 按具体角色配色（addressed_to 为主键）
const ROLE_STYLES = {
  '老婆':   { emoji:'👩', color:'#d946ef', bg:'#fdf4ff' },
  '老公':   { emoji:'👨', color:'#8b5cf6', bg:'#f5f3ff' },
  '妈妈':   { emoji:'🤱', color:'#ec4899', bg:'#fdf2f8' },
  '爸爸':   { emoji:'👨‍🦳', color:'#6366f1', bg:'#eef2ff' },
  '朋友':   { emoji:'🙋', color:'#f59e0b', bg:'#fffbeb' },
  'AI助手': { emoji:'🤖', color:'var(--role-ai)', bg:'var(--role-ai-bg)' },
  '商家':   { emoji:'🏪', color:'var(--role-merchant)', bg:'var(--role-merchant-bg)' },
  '宠物':   { emoji:'🐾', color:'var(--role-pet)', bg:'var(--role-pet-bg)' },
  '自己':   { emoji:'💭', color:'var(--role-self)', bg:'var(--role-self-bg)' },
};
const DEFAULT_STYLE = { emoji:'❓', color:'var(--role-uncertain)', bg:'var(--role-uncertain-bg)' };
function getRoleStyle(addr) { return ROLE_STYLES[addr] || DEFAULT_STYLE; }
// 保留旧 ROLES 给筛选栏等兼容用
const ROLES = {
  '跟AI说':   { emoji:'🤖', color:'var(--role-ai)',           bg:'var(--role-ai-bg)' },
  '跟商家':   { emoji:'🏪', color:'var(--role-merchant)',     bg:'var(--role-merchant-bg)' },

  '跟人聊':   { emoji:'💬', color:'var(--role-interpersonal)',bg:'var(--role-interpersonal-bg)' },

let allDates = [], currentDate = null, currentData = null, activeFilters = new Set(), searchTimer = null;
let chartInstances = [];

async function init() {
  const [dates, stats] = await Promise.all([
    fetch('/api/dates').then(r=>r.json()),
    fetch('/api/stats').then(r=>r.json()),
  ]);
  allDates = dates;

  document.getElementById('stats').innerHTML = `
    <span class="stat-item"><span class="stat-num">${stats.total_dates}</span>天</span>
    <span class="stat-item"><span class="stat-num">${stats.total_segments}</span>段</span>
    <span class="stat-item"><span class="stat-num">${fmtNum(stats.total_words)}</span>字</span>`;

  // 全局角色条
  const rd = stats.role_distribution || {};
  const total = Object.values(rd).reduce((a,b)=>a+b,0);
  const getBarColor = (r) => { const sty = getRoleStyle(r); return typeof sty.color === 'string' && sty.color.startsWith('#') ? sty.color : (sty.color || '#ccc'); };
  if (total > 0) {
    document.getElementById('globalBar').innerHTML = Object.entries(rd).map(([r,c])=>`<div style="flex:${c};background:${getBarColor(r)}"></div>`).join('');
    document.getElementById('globalLegend').innerHTML = Object.entries(rd).map(([r,c])=>`<span><span class="dot" style="background:${getBarColor(r)}"></span>${r} ${c}</span>`).join('');
  }

  // 日期列表
  let dh = '';
  allDates.forEach(d => {
    dh += `<div class="date-item" data-date="${d.date}" onclick="loadDate('${d.date}')">
      <span class="icon">📄</span> ${d.date} <span class="meta">${d.segments}段</span>
    </div>`;
  });
  document.getElementById('dateList').innerHTML = dh;

  // 搜索
  document.getElementById('searchInput').addEventListener('input', e => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => doSearch(e.target.value), 300);
  });

  if (allDates.length > 0) loadDate(allDates[0].date);
}

async function loadDate(date, targetId) {
  currentDate = date;
  currentData = await fetch(`/api/date/${date}`).then(r=>r.json());
  activeFilters.clear();

  document.querySelectorAll('.date-item').forEach(el => {
    el.classList.toggle('active', el.dataset.date === date);
  });

  renderDayLayout();

  if (targetId) {
    setTimeout(() => {
      const el = document.getElementById(targetId);
      if (el) {
        el.classList.remove('hidden');
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        el.classList.add('highlight-target');
        const rawBtn = el.querySelector('.raw-btn');
        if (rawBtn) toggleRawText(rawBtn);
      }
    }, 150);
  }
}

function renderDayLayout() {
  const d = currentData;
  const m = d.meta;
  const rc = {};
  let needsReviewCnt = 0;

  d.segments.forEach(s => {
    const a = s.role?.addressed_to || '未识别';
    rc[a] = (rc[a]||0) + 1;
    if (s.role?.needs_review) needsReviewCnt++;
  });

  let h = '';
  h += `<div class="page-header">
    <div class="page-icon">📅</div>
    <div class="page-title">${d.date}</div>
    <div class="page-meta"><span>${d.segments.length} 个场景</span><span>${fmtNum(d.word_count)} 字</span></div>
  </div>`;

  if (m?.daily_summary) {
    h += `<div class="callout"><span class="callout-icon">💡</span><div class="callout-body">${m.daily_summary}</div></div>`;
  }

  // Props 三栏元数据卡片
  if (m) {
    const hasEvents = m.events?.length > 0;
    const hasDecisions = m.decisions?.length > 0;
    const hasTodos = m.todos?.length > 0;
    const hasInsights = m.insights?.length > 0;
    if (hasEvents || hasDecisions || hasTodos || hasInsights) {
      h += '<div class="props-grid">';
      if (hasEvents) {
        h += `<div class="prop-card">
          <div class="prop-card-title"><span class="dot" style="background:#2eaadc"></span>📌 事件 <span class="prop-count">${m.events.length}</span></div>`;
        m.events.forEach(e => {
          h += `<div class="prop-item"><span class="time-tag">${e.time||''}</span><span class="project-tag">${e.project||''}</span>${e.summary}</div>`;
        });
        h += '</div>';
      }
      if (hasDecisions) {
        h += `<div class="prop-card">
          <div class="prop-card-title"><span class="dot" style="background:#d9730d"></span>🎯 决策 <span class="prop-count">${m.decisions.length}</span></div>`;
        m.decisions.forEach(dd => {
          h += `<div class="prop-item"><span class="project-tag">${dd.project||''}</span>${dd.what}</div>`;
        });
        h += '</div>';
      }
      if (hasTodos) {
        h += `<div class="prop-card">
          <div class="prop-card-title"><span class="dot" style="background:#0f7b6c"></span>✅ 待办 <span class="prop-count">${m.todos.length}</span></div>`;
        m.todos.forEach(t => {
          const pri = t.priority === 'high' ? '🔴' : t.priority === 'medium' ? '🟡' : '⚪';
          h += `<div class="prop-item">${pri} <span class="project-tag">${t.project||''}</span>${t.task}</div>`;
        });
        h += '</div>';
      }
      if (hasInsights) {
        h += `<div class="prop-card">
          <div class="prop-card-title"><span class="dot" style="background:#9065b0"></span>⚡ 洞察 <span class="prop-count">${m.insights.length}</span></div>`;
        m.insights.forEach(i => {
          h += `<div class="prop-item"><span class="project-tag">${i.topic||''}</span>${i.content}</div>`;
        });
        h += '</div>';
      }
      h += '</div>';
    }
  }

  // 视图 Tabs
  h += `<div class="view-tabs">
    <button class="view-tab active" id="tab-briefing" onclick="switchView('briefing')">📋 日报</button>
    <button class="view-tab" id="tab-timeline" onclick="switchView('timeline')">🕒 蒸馏时间线</button>
    <button class="view-tab" id="tab-table" onclick="switchView('table')">📊 数据表格</button>
    <button class="view-tab" id="tab-charts" onclick="switchView('charts')">📈 可视化</button>
  </div>`;

  // 角色筛选器
  h += '<div class="role-tags" id="filter-bar">';
  if (Object.keys(rc).length > 1) {
    h += `<button class="role-tag active" style="background:var(--bg-tag);color:var(--text)" data-role="all" onclick="filterRole('all')">全部 <span class="cnt">${d.segments.length}</span></button>`;
    for (const [r,c] of Object.entries(rc)) {
      const sty = getRoleStyle(r);
      h += `<button class="role-tag" style="background:${sty.bg};color:${sty.color}" data-role="${r}" onclick="filterRole('${r}')">${sty.emoji} ${r} <span class="cnt">${c}</span></button>`;
    }
    if (needsReviewCnt > 0) {
      h += `<button class="role-tag" style="background:#fff3db;color:#d9730d" data-role="needs_review" onclick="filterRole('needs_review')">🚨 待确认 <span class="cnt">${needsReviewCnt}</span></button>`;
    }
  }
  h += '</div>';

  h += `<div id="view-briefing" class="view-content active"></div>`;
  h += `<div id="view-timeline" class="view-content"></div>`;
  h += `<div id="view-table" class="view-content"></div>`;
  h += `<div id="view-charts" class="view-content"></div>`;

  document.getElementById('main').innerHTML = h;
  renderBriefingView();
  renderTimelineView();
  renderTableView();
  renderChartsView();
}

function stripMd(t) {
  if (!t) return '';
  return t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/`([^`]+)`/g, '<code>$1</code>');
}

function getSegmentDistillation(s, meta) {
  let highlights = [];
  if (meta) {
    (meta.events || []).filter(e => e.time === s.time).forEach(e => highlights.push(`📌 <strong>[${e.project||'事件'}]</strong> ${stripMd(e.summary)}`));
    (meta.decisions || []).filter(dd => dd.time === s.time).forEach(dd => highlights.push(`🎯 <strong>[${dd.project||'决策'}]</strong> ${stripMd(dd.what)}`));
    (meta.todos || []).filter(t => t.time === s.time).forEach(t => highlights.push(`✅ <strong>[${t.project||'待办'}]</strong> ${stripMd(t.task)}`));
  }
  if (highlights.length > 0) return highlights.join('<br>');
  if (s.summary && s.summary.trim() !== "") return `<div class="seg-distilled-placeholder">💭 ${stripMd(s.summary)}</div>`;
  return `<div class="seg-distilled-placeholder">" ${stripMd(s.preview)}... "</div>`;
}

function renderTimelineView() {
  const d = currentData;
  let h = '<div class="timeline">';
  d.segments.forEach(s => {
    const role = s.role;
    const addr = role?.addressed_to || '未识别';
    const sty = getRoleStyle(addr);
    const nr = role?.needs_review;
    const segId = `seg-${s.time.replace(':', '-')}`;
    const distilledHTML = getSegmentDistillation(s, d.meta);

    h += `<div class="tl-node" id="${segId}" data-role="${addr}" data-needs-review="${nr?'true':'false'}">
      <span class="tl-time">${s.time}</span>
      <div class="tl-dot" style="border-color:${sty.color};background:${nr?'#fff3db':sty.bg}"></div>
      <div class="tl-card">
        <div class="tl-role-row">
          <span class="role-label ${nr?'needs-review':''}" style="background:${sty.bg};color:${sty.color}">
            ${sty.emoji} ${addr}
          </span>
          ${(s.screen_sessions && s.screen_sessions.length > 0) ? s.screen_sessions.slice(0,2).map(ss => `<span class="screen-badge"><span class="sb-icon">🖥️</span>${ss.app_name}</span>`).join('') : ''}
          ${(s.role?.source === 'screen_hint') ? '<span class="screen-badge" style="background:#fff7ed;color:#c2410c"><span class="sb-icon">👁️</span>屏幕推断</span>' : ''}
        </div>
        <div class="seg-distilled">${distilledHTML}</div>
        <div class="raw-controls"><button class="raw-btn" onclick="toggleRawText(this)">👁️ 显示原文</button></div>
        <div class="seg-raw">${fmtText(s.text)}</div>
      </div>
    </div>`;
  });
  h += '</div>';
  document.getElementById('view-timeline').innerHTML = h;
}

function renderTableView() {
  const d = currentData;
  let h = '<div class="table-view"><table class="data-table">';
  h += '<thead><tr><th width="80">时间</th><th width="120">角色</th><th>内容预览</th><th width="100">操作</th></tr></thead><tbody>';
  d.segments.forEach(s => {
    const rl = s.role?.scene_type_label||'不确定';
    const cfg = ROLES[rl]||ROLES['不确定'];
    const preview = stripMd(s.preview).substring(0, 50) + '...';
    const segId = `seg-${s.time.replace(':', '-')}`;
    h += `<tr>
      <td class="td-time">${s.time}</td>
      <td><span style="color:${cfg.color};font-size:12px;font-weight:600">${cfg.emoji} ${rl}</span></td>
      <td class="td-summary">${preview}</td>
      <td><button class="raw-btn" onclick="switchView('timeline');loadDate('${d.date}','${segId}')">👉 跳转</button></td>
    </tr>`;
  });
  h += '</tbody></table></div>';
  document.getElementById('view-table').innerHTML = h;
}

function renderChartsView() {
  let h = '<div class="charts-grid">';
  h += '<div class="chart-card"><h3>🎭 角色分布</h3><canvas id="chartRoles"></canvas></div>';
  h += '<div class="chart-card"><h3>🕒 时段热度</h3><canvas id="chartTime"></canvas></div>';
  h += '</div>';
  document.getElementById('view-charts').innerHTML = h;
}

function initCharts() {
  const d = currentData;
  chartInstances.forEach(c => c.destroy());
  chartInstances = [];

  const rc = {};
  d.segments.forEach(s => { const a = s.role?.addressed_to||'未识别'; rc[a] = (rc[a]||0)+1; });
  const getChartColor = (k) => { const sty = getRoleStyle(k); return typeof sty.color === 'string' && sty.color.startsWith('#') ? sty.color : '#9b9a97'; };

  const c1 = document.getElementById('chartRoles');
  if (c1) {
    chartInstances.push(new Chart(c1, {
      type: 'doughnut',
      data: { labels: Object.keys(rc), datasets: [{ data: Object.values(rc), backgroundColor: Object.keys(rc).map(k => getChartColor(k)) }] },
      options: { plugins: { legend: { position: 'bottom' } }, maintainAspectRatio: false }
    }));
  }

  const tc = {};
  d.segments.forEach(s => { const hour = s.time.split(':')[0]+':00'; tc[hour] = (tc[hour]||0)+s.text.length; });
  const sortedH = Object.keys(tc).sort();
  const c2 = document.getElementById('chartTime');
  if (c2) {
    chartInstances.push(new Chart(c2, {
      type: 'bar',
      data: { labels: sortedH, datasets: [{ label: '字数', data: sortedH.map(h => tc[h]), backgroundColor: '#2eaadc', borderRadius: 4 }] },
      options: { plugins: { legend: { display: false } }, maintainAspectRatio: false }
    }));
  }
}

function switchView(viewName) {
  document.querySelectorAll('.view-tab').forEach(el => el.classList.remove('active'));
  document.getElementById(`tab-${viewName}`).classList.add('active');
  document.querySelectorAll('.view-content').forEach(el => el.classList.remove('active'));
  document.getElementById(`view-${viewName}`).classList.add('active');

  const filterBar = document.getElementById('filter-bar');
  filterBar.style.display = viewName === 'timeline' ? 'flex' : 'none';
  if (viewName === 'charts') setTimeout(initCharts, 50);
}

// ── Briefing 仪表盘 ──
let briefingCache = {};
async function renderBriefingView() {
  const container = document.getElementById('view-briefing');
  if (!currentDate) { container.innerHTML = ''; return; }

  // 加载 briefing 数据
  let briefing = briefingCache[currentDate];
  if (!briefing) {
    try {
      const resp = await fetch(`/api/briefing/${currentDate}`);
      if (resp.ok) {
        briefing = await resp.json();
        briefingCache[currentDate] = briefing;
      }
    } catch(e) {}
  }

  if (!briefing || briefing.error) {
    container.innerHTML = `<div class="briefing-banner" style="background:linear-gradient(135deg,#94a3b8,#64748b)">
      <h2>📋 暂无日报</h2>
      <div class="briefing-summary">${currentDate} 的 Daily Briefing 尚未生成。运行 <code style="background:rgba(255,255,255,0.2);padding:2px 6px;border-radius:4px">python -m openmy.services.briefing ${currentDate}</code> 来生成。</div>
    </div>`;
    return;
  }

  let h = '';

  // ── 顶部 Banner ──
  h += `<div class="briefing-banner">
    <h2>📋 Daily Briefing</h2>
    <div class="briefing-summary">${briefing.summary}</div>
    <div class="briefing-stats-row">
      <div class="briefing-stat"><span class="briefing-stat-num">${briefing.total_scenes || 0}</span><span class="briefing-stat-label">场景</span></div>
      <div class="briefing-stat"><span class="briefing-stat-num">${fmtNum(briefing.total_words || 0)}</span><span class="briefing-stat-label">字数</span></div>
      <div class="briefing-stat"><span class="briefing-stat-num">${briefing.voice_hours || 0}h</span><span class="briefing-stat-label">语音时长</span></div>
      <div class="briefing-stat"><span class="briefing-stat-num">${briefing.screenpipe_available ? '✅' : '—'}</span><span class="briefing-stat-label">Screenpipe</span></div>
    </div>
  </div>`;

  h += '<div class="briefing-grid">';

  // ── 时段块 ──
  if (briefing.time_blocks && briefing.time_blocks.length > 0) {
    h += `<div class="briefing-card briefing-card-full">
      <div class="briefing-card-title">🕒 时段概览</div>`;
    briefing.time_blocks.forEach(tb => {
      const modeBadge = tb.mode === 'dual'
        ? '<span class="tb-mode-badge tb-mode-dual">🖥️+🎤</span>'
        : '<span class="tb-mode-badge tb-mode-voice">🎤</span>';
      h += `<div class="time-block">
        <div class="tb-period">${tb.period.split(' ')[0]}</div>
        <div class="tb-body">
          <div class="tb-summary">${tb.summary} ${modeBadge} <span style="font-size:11px;color:var(--text-light)">${tb.scene_count}段</span></div>
          <div class="tb-tags">
            ${(tb.people_talked_to||[]).map(p => { const sty = getRoleStyle(p); return `<span class="tb-tag tb-tag-person">${sty.emoji} ${p}</span>`; }).join('')}
            ${(tb.apps_used||[]).map(a => `<span class="tb-tag tb-tag-app">💻 ${a}</span>`).join('')}
          </div>
        </div>
      </div>`;
    });
    h += '</div>';
  }

  // ── 人物互动 ──
  const people = briefing.people_interaction_map || {};
  if (Object.keys(people).length > 0) {
    h += `<div class="briefing-card">
      <div class="briefing-card-title">👥 人物互动</div>
      <div class="people-grid">`;
    for (const [name, info] of Object.entries(people)) {
      const sty = getRoleStyle(name);
      h += `<div class="people-chip">
        <div class="people-avatar" style="background:${sty.bg};color:${sty.color}">${sty.emoji}</div>
        <div class="people-info">
          <div class="people-name">${name}</div>
          <div class="people-meta">${info.scene_count} 段对话</div>
        </div>
      </div>`;
    }
    h += '</div></div>';
  }

  // ── App 使用 ──
  const sessions = briefing.work_sessions || {};
  if (Object.keys(sessions).length > 0) {
    h += `<div class="briefing-card">
      <div class="briefing-card-title">💻 App 使用</div>`;
    const maxVal = Math.max(...Object.values(sessions).map(v => parseInt(v) || 1));
    for (const [app, duration] of Object.entries(sessions)) {
      const numVal = parseInt(duration) || 1;
      const pct = Math.max(5, (numVal / maxVal) * 100);
      h += `<div class="app-bar-row">
        <span class="app-bar-name">${app}</span>
        <div class="app-bar-track"><div class="app-bar-fill" style="width:${pct}%"></div></div>
        <span class="app-bar-duration">${duration}</span>
      </div>`;
    }
    h += '</div>';
  }

  // ── 关键事件 ──
  if (briefing.key_events && briefing.key_events.length > 0) {
    h += `<div class="briefing-card briefing-card-full">
      <div class="briefing-card-title">📌 关键事件 <span class="prop-count">${briefing.key_events.length}</span></div>`;
    briefing.key_events.forEach(ev => {
      h += `<div class="event-item"><span class="event-icon">•</span> ${ev}</div>`;
    });
    h += '</div>';
  }

  // ── 决策 ──
  if (briefing.decisions && briefing.decisions.length > 0) {
    h += `<div class="briefing-card">
      <div class="briefing-card-title">🎯 决策 <span class="prop-count">${briefing.decisions.length}</span></div>`;
    briefing.decisions.forEach(d => {
      h += `<div class="event-item"><span class="event-icon">🎯</span> ${d}</div>`;
    });
    h += '</div>';
  }

  // ── 待办 ──
  if (briefing.todos_open && briefing.todos_open.length > 0) {
    h += `<div class="briefing-card">
      <div class="briefing-card-title">✅ 待办 <span class="prop-count">${briefing.todos_open.length}</span></div>`;
    briefing.todos_open.forEach(t => {
      h += `<div class="event-item"><span class="event-icon">☐</span> ${t}</div>`;
    });
    h += '</div>';
  }

  h += '</div>'; // close briefing-grid
  container.innerHTML = h;
}

function toggleRawText(btn) {
  const rawDiv = btn.parentElement.nextElementSibling;
  const isHidden = !rawDiv.classList.contains('visible');
  if (isHidden) {
    rawDiv.classList.add('visible');
    btn.innerHTML = '🙈 隐藏原文';
    btn.style.color = '#fff';
    btn.style.background = 'var(--text)';
  } else {
    rawDiv.classList.remove('visible');
    btn.innerHTML = '👁️ 显示原文';
    btn.style.color = 'var(--text-secondary)';
    btn.style.background = 'var(--bg-sidebar)';
  }
}

function filterRole(role) {
  if (role==='all') { activeFilters.clear(); }
  else { activeFilters.has(role) ? activeFilters.delete(role) : activeFilters.add(role); }
  document.querySelectorAll('.role-tag').forEach(b => {
    if (b.dataset.role==='all') b.classList.toggle('active', activeFilters.size===0);
    else b.classList.toggle('active', activeFilters.has(b.dataset.role));
  });
  document.querySelectorAll('#view-timeline .tl-node').forEach(el => {
    if (activeFilters.size === 0) { el.classList.remove('hidden'); return; }
    let m = false;
    if (activeFilters.has('needs_review') && el.dataset.needsReview === 'true') m = true;
    if (activeFilters.has(el.dataset.role)) m = true;
    el.classList.toggle('hidden', !m);
  });
}

async function doSearch(q) {
  if (!q.trim()) { if (currentDate) loadDate(currentDate); return; }
  const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`).then(r=>r.json());
  const main = document.getElementById('main');
  if (!res.length) { main.innerHTML = `<div class="empty"><div class="icon">🔍</div><p>没有找到"${q}"</p></div>`; return; }
  main.innerHTML = `<div class="search-header">🔍 "${q}" — ${res.length} 条结果</div>` +
    res.map(r => {
      const tid = `seg-${r.time.replace(':','-')}`;
      return `<div class="search-result" onclick="loadDate('${r.date}','${tid}')">
        <div class="sr-meta">📄 ${r.date} · ${r.time}</div>
        <div class="sr-context">${r.context}</div>
      </div>`;
    }).join('');
}

function fmtText(t) {
  const hl = t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
  return hl.split(/\n+/).map(p => p.trim() ? `<p>${p}</p>` : '').join('');
}
function fmtNum(n) { return n>=10000?(n/10000).toFixed(1)+'万':n>=1000?(n/1000).toFixed(1)+'k':n.toString(); }
function stripMd(t) { return (t||'').replace(/\*\*(.*?)\*\*/g,'$1').replace(/\*(.*?)\*/g,'$1').replace(/<[^>]+>/g,''); }

// ── 纠错反馈循环 ──
let selectedWrongText = '';

document.addEventListener('mouseup', (e) => {
  const correctBtn = document.getElementById('correctBtn');
  const selection = window.getSelection();
  const text = selection.toString().trim();
  if (text.length >= 2 && text.length <= 30) {
    const anchor = selection.anchorNode;
    if (anchor && anchor.parentElement && (anchor.parentElement.closest('.seg-raw') || anchor.parentElement.closest('.seg-distilled') || anchor.parentElement.closest('.segment'))) {
      selectedWrongText = text;
      correctBtn.style.display = 'block';
      correctBtn.style.left = (e.clientX + 8) + 'px';
      correctBtn.style.top = (e.clientY - 32) + 'px';
      return;
    }
  }
  setTimeout(() => {
    if (!document.getElementById('correctModal').classList.contains('visible')) {
      correctBtn.style.display = 'none';
    }
  }, 200);
});

function openCorrectionModal() {
  document.getElementById('correctBtn').style.display = 'none';
  document.getElementById('correctWrong').textContent = selectedWrongText;
  document.getElementById('correctRight').value = '';
  document.getElementById('correctContext').value = '';
  document.getElementById('correctModal').classList.add('visible');
  setTimeout(() => document.getElementById('correctRight').focus(), 100);
}
function closeCorrectionModal() {
  document.getElementById('correctModal').classList.remove('visible');
  selectedWrongText = '';
}

async function submitCorrection() {
  const wrong = selectedWrongText;
  const right = document.getElementById('correctRight').value.trim();
  const context = document.getElementById('correctContext').value.trim();
  if (!right) { document.getElementById('correctRight').style.borderColor = '#dc2626'; return; }
  if (wrong === right) { showToast('❌ 纠正前后相同'); return; }
  try {
    const res = await fetch('/api/correct', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ wrong, right, date: currentDate || '', context, sync_vocab: true })
    }).then(r => r.json());
    if (res.success) {
      closeCorrectionModal();
      document.querySelectorAll('.seg-raw').forEach(el => {
        el.innerHTML = el.innerHTML.replaceAll(wrong,
          `<span style="background:#dcfce7;color:#16a34a;padding:1px 3px;border-radius:3px">${right}</span>`);
      });
      let msg = `✅ 已纠正："${wrong}" → "${right}"`;
      if (res.replaced_in_file > 0) msg += ` (文件中替换 ${res.replaced_in_file} 处)`;
      showToast(msg);
    } else { showToast(`❌ ${res.error || '纠正失败'}`); }
  } catch (err) { showToast(`❌ 网络错误: ${err.message}`); }
}

function showToast(msg) {
  const toast = document.getElementById('correctToast');
  toast.textContent = msg;
  toast.classList.add('visible');
  setTimeout(() => toast.classList.remove('visible'), 3000);
}

document.addEventListener('keydown', (e) => {
  const modal = document.getElementById('correctModal');
  if (!modal.classList.contains('visible')) return;
  if (e.key === 'Escape') closeCorrectionModal();
  if (e.key === 'Enter') submitCorrection();
});

init();
</script>
