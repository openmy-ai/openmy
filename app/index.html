<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenMy</title>
<meta name="description" content="个人每日上下文工作台">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
  --bg: #ffffff;
  --bg-hover: #f8fafc;
  --bg-active: #f1f5f9;
  --bg-sidebar: #fbfcfd;
  --bg-tag: #f1f5f9;
  --text: #0f172a;
  --text-secondary: #475569;
  --text-light: #94a3b8;
  --border: #e2e8f0;
  --accent: #3b82f6;
  --accent-light: #eff6ff;
  --success: #059669;
  --success-bg: #d1fae5;
  --warning: #d97706;
  --warning-bg: #fef3c7;

  --role-ai: #0ea5e9;
  --role-ai-bg: #e0f2fe;
  --role-merchant: #f97316;
  --role-merchant-bg: #ffedd5;
  --role-pet: #ec4899;
  --role-pet-bg: #fce7f3;
  --role-self: #8b5cf6;
  --role-self-bg: #ede9fe;
  --role-interpersonal: #10b981;
  --role-interpersonal-bg: #d1fae5;
  --role-uncertain: #64748b;
  --role-uncertain-bg: #f1f5f9;

  --radius: 12px;
  --radius-sm: 8px;
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
  --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
  --shadow-hover: 0 10px 15px -3px rgba(0, 0, 0, 0.08), 0 4px 6px -2px rgba(0, 0, 0, 0.04);
  --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-serif: 'Noto Serif SC', Georgia, serif;
  --transition: 0.25s cubic-bezier(0.16, 1, 0.3, 1);
}

/* Dark Mode */
[data-theme="dark"] {
  --bg: #0f172a; --bg-hover: #1e293b; --bg-active: #334155;
  --bg-sidebar: #0c1220; --bg-tag: #1e293b;
  --text: #f1f5f9; --text-secondary: #94a3b8; --text-light: #64748b;
  --border: #334155; --accent: #60a5fa; --accent-light: #1e3a5f;
  --success: #34d399; --success-bg: #064e3b; --warning: #fbbf24; --warning-bg: #451a03;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.3); --shadow: 0 4px 6px rgba(0,0,0,0.4);
  --shadow-hover: 0 10px 15px rgba(0,0,0,0.5);
}
[data-theme="dark"] .cp-wrong { background: #3b1818; border-color: #7f1d1d; color: #fca5a5; }
[data-theme="dark"] .sidebar-search-btn kbd { background: #1e293b; border-color: #475569; }

/* Font Size */
:root { font-size: 15px; }
[data-font-size="small"] { font-size: 13px; }
[data-font-size="large"] { font-size: 17px; }

/* Accent Colors */
[data-accent="purple"] { --accent: #8b5cf6; --accent-light: #ede9fe; }
[data-accent="green"]  { --accent: #059669; --accent-light: #d1fae5; }
[data-accent="amber"]  { --accent: #d97706; --accent-light: #fef3c7; }
[data-accent="pink"]   { --accent: #ec4899; --accent-light: #fce7f3; }
[data-theme="dark"][data-accent="purple"] { --accent: #a78bfa; --accent-light: #2e1065; }
[data-theme="dark"][data-accent="green"]  { --accent: #34d399; --accent-light: #064e3b; }
[data-theme="dark"][data-accent="amber"]  { --accent: #fbbf24; --accent-light: #451a03; }
[data-theme="dark"][data-accent="pink"]   { --accent: #f472b6; --accent-light: #500724; }

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  font-size: 1rem;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

.app {
  display: grid;
  grid-template-columns: 260px 1fr;
  min-height: 100vh;
}

.sidebar {
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border);
  padding: 24px 16px;
  overflow-y: auto;
  position: sticky;
  top: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

.logo { display: flex; align-items: baseline; gap: 8px; padding: 4px 8px; margin-bottom: 8px; }
.logo-title { font-family: var(--font-body); font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
.logo-sub { font-size: 11px; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }

.search-box { padding: 0 4px; margin: 12px 0; }
.search-box input,
.field-input,
.field-select,
.field-textarea {
  width: 100%;
  padding: 10px 14px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 13px;
  font-family: var(--font-body);
  outline: none;
  transition: border var(--transition), box-shadow var(--transition);
}

.search-box input:focus,
.field-input:focus,
.field-select:focus,
.field-textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }

.stats { padding: 8px 12px; font-size: 12px; color: var(--text-secondary); display: flex; gap: 16px; margin-bottom: 4px; }
.stat-item { display: flex; align-items: center; gap: 4px; }
.stat-num { font-weight: 700; color: var(--text); font-size: 14px; }

.mini-role-bar { display: flex; height: 4px; border-radius: 2px; overflow: hidden; margin: 8px 12px 12px; gap: 2px; }
.mini-role-bar div { height: 100%; min-width: 4px; border-radius: 2px; }

.role-legend-mini { padding: 0 12px 16px; display: flex; flex-wrap: wrap; gap: 6px 12px; }
.role-legend-mini span { font-size: 11px; color: var(--text-secondary); display: flex; align-items: center; gap: 4px; font-weight: 500; }
.role-legend-mini .dot { width: 8px; height: 8px; border-radius: 50%; opacity: 0.8; }

.divider { height: 1px; background: var(--border); margin: 8px 12px 16px; }
.section-label { font-size: 11px; font-weight: 700; color: var(--text-light); padding: 4px 12px; text-transform: uppercase; letter-spacing: 0.05em; }

.date-list { flex: 1; overflow-y: auto; margin-top: 8px; }
.date-item {
  display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: var(--radius-sm);
  cursor: pointer; transition: all var(--transition); font-size: 13px; color: var(--text-secondary);
  border: none; background: transparent; width: 100%; text-align: left; margin-bottom: 2px;
}
.date-item:hover { background: var(--bg-hover); color: var(--text); }
.date-item.active { background: var(--bg-active); color: var(--accent); font-weight: 600; }
.date-item .icon { font-size: 15px; opacity: 0.7; }
.date-item .meta { margin-left: auto; font-size: 11px; color: var(--text-light); font-weight: 500; background: var(--bg-hover); padding: 2px 6px; border-radius: 10px; }

.main { max-width: 1060px; margin: 0 auto; padding: 48px 56px 100px; width: 100%; }

.page-header { margin-bottom: 40px; }
.page-icon { font-size: 42px; display: inline-block; margin-bottom: 16px; padding: 12px; background: var(--bg-hover); border-radius: 16px; border: 1px solid var(--border); box-shadow: var(--shadow-sm); }
.page-title { font-family: var(--font-body); font-size: 36px; font-weight: 800; letter-spacing: -0.03em; color: var(--text); line-height: 1.1; margin-bottom: 8px; }
.page-meta { font-size: 13px; color: var(--text-secondary); display: flex; gap: 20px; align-items: center; font-weight: 500; }

.view-tabs { display: flex; gap: 4px; margin-bottom: 32px; border-bottom: 1px solid var(--border); padding-bottom: 12px; }
.view-tab {
  padding: 8px 18px; border: none; background: transparent; color: var(--text-secondary);
  font-size: 14px; font-weight: 600; cursor: pointer; border-radius: var(--radius-sm);
  transition: all var(--transition);
}
.view-tab:hover { background: var(--bg-hover); color: var(--text); }
.view-tab.active { background: var(--text); color: #fff; box-shadow: var(--shadow-sm); }

.view-content { display: none; margin-top: 16px; }
.view-content.active { display: block; animation: fadeUp 0.4s ease forwards; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.role-tags { display: flex; flex-wrap: wrap; gap: 8px; margin: 0 0 32px; }
.role-tag {
  display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px;
  border-radius: 20px; font-size: 13px; font-weight: 500; cursor: pointer;
  border: 1px solid transparent; font-family: var(--font-body);
  transition: all var(--transition); opacity: 0.8; box-shadow: var(--shadow-sm);
}
.role-tag:hover { opacity: 1; transform: translateY(-1px); box-shadow: var(--shadow); }
.role-tag.active { opacity: 1; border-color: currentColor; }

.callout {
  background: var(--bg-hover); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 20px 24px; margin-bottom: 32px; display: flex; gap: 16px; box-shadow: var(--shadow-sm);
}
.callout-icon { font-size: 24px; flex-shrink: 0; }
.callout-body { font-size: 15px; color: var(--text); flex: 1; line-height: 1.6; font-weight: 500; }

.props-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 40px; }
.prop-card {
  background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 20px 24px; box-shadow: var(--shadow-sm); transition: transform var(--transition), box-shadow var(--transition);
}
.prop-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); border-color: #cbd5e1; }
.prop-card-title {
  font-size: 12px; font-weight: 700; color: var(--text-secondary); margin-bottom: 16px;
  display: flex; align-items: center; gap: 8px; text-transform: uppercase; letter-spacing: 0.05em;
}
.prop-card-title .dot { width: 10px; height: 10px; border-radius: 50%; box-shadow: 0 0 0 2px rgba(255,255,255,0.8); }
.prop-item { font-size: 14px; color: var(--text); padding: 10px 0; border-bottom: 1px dashed var(--border); }
.prop-item:last-child { border-bottom: none; }
.prop-item .time-tag { font-size: 11px; color: var(--text-light); font-family: monospace; margin-right: 8px; background: var(--bg-hover); padding: 2px 6px; border-radius: 4px; }
.prop-item .project-tag { font-size: 11px; padding: 2px 8px; border-radius: 12px; background: var(--accent-light); color: var(--accent); font-weight: 600; margin-right: 8px; }
.prop-count { font-size: 12px; color: var(--text-light); font-weight: 500; margin-left: auto; background: var(--bg-hover); padding: 2px 8px; border-radius: 12px; }

.timeline { position: relative; padding-left: 90px; }
.timeline::before { content: ''; position: absolute; left: 70px; top: 0; bottom: 0; width: 2px; background: linear-gradient(to bottom, var(--border) 0%, var(--border) 90%, transparent 100%); }
.tl-node { position: relative; padding: 0 0 40px 40px; }
.tl-node.hidden { display: none; }
.tl-node:last-child { padding-bottom: 0; }
.tl-node:last-child::after { content: ''; position: absolute; left: -22px; top: 14px; bottom: 0; width: 2px; background: var(--bg); z-index: 1; }
.tl-dot { position: absolute; left: -25px; top: 8px; width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--bg); background: var(--border); z-index: 2; box-shadow: 0 0 0 3px var(--border); transition: all 0.3s; }
.tl-node:hover .tl-dot { transform: scale(1.4); box-shadow: 0 0 0 4px var(--accent-light); }
.tl-time { position: absolute; left: -90px; top: 3px; width: 50px; text-align: right; font-size: 13px; font-weight: 600; color: var(--text-secondary); font-variant-numeric: tabular-nums; }
.tl-card {
  background: var(--bg); border: 1px solid var(--border); border-radius: 16px; padding: 20px 24px;
  box-shadow: var(--shadow-sm); transition: all var(--transition);
}
.tl-node:hover .tl-card { box-shadow: var(--shadow); border-color: #cbd5e1; transform: translateX(2px); }
.tl-role-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }

.role-label, .status-pill {
  display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px;
  border-radius: 20px; font-size: 12px; font-weight: 600;
}
.role-label.needs-review { outline: 2px dashed var(--warning); outline-offset: 2px; }
.status-pill { background: var(--success-bg); color: var(--success); }

.seg-distilled { font-size: 16px; line-height: 1.6; margin-bottom: 16px; color: var(--text); font-weight: 400; }
.seg-distilled strong { font-weight: 600; color: #1e293b; }
.seg-distilled-placeholder { font-size: 14px; color: var(--text-secondary); font-style: italic; background: var(--bg-hover); padding: 12px 16px; border-radius: 8px; border-left: 3px solid var(--text-light); }
.raw-controls { display: flex; justify-content: flex-start; }
.raw-btn, .action-btn {
  background: var(--bg-hover); border: 1px solid var(--border); padding: 8px 16px;
  border-radius: var(--radius-sm); font-size: 12px; font-weight: 600; color: var(--text-secondary);
  cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: all var(--transition);
}
.action-btn.primary { background: var(--text); color: #ffffff; border-color: var(--text); }
.action-btn:hover, .raw-btn:hover { background: var(--bg-active); border-color: #cbd5e1; color: var(--text); }

.seg-raw { margin-top: 16px; padding: 20px; background: var(--bg-hover); border-radius: var(--radius); font-size: 14px; line-height: 1.8; color: var(--text-secondary); border: 1px solid var(--border); display: none; }
.seg-raw.visible { display: block; animation: fadeUp 0.3s ease; }

.table-view { width: 100%; overflow-x: auto; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow-sm); }
.data-table { width: 100%; border-collapse: collapse; font-size: 14px; }
.data-table th, .data-table td { padding: 14px 20px; text-align: left; border-bottom: 1px solid var(--border); }
.data-table th { background: var(--bg-hover); font-weight: 600; color: var(--text-secondary); font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; }
.data-table tr:hover { background: var(--bg-hover); }
.data-table tr:last-child td { border-bottom: none; }
.data-table .td-time { font-family: monospace; font-weight: 600; color: var(--text-secondary); }

.charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
.chart-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow-sm); }
.chart-card h3 { font-size: 15px; font-weight: 700; margin-bottom: 20px; color: var(--text); }
.chart-card canvas { max-height: 280px; }

.briefing-banner {
  background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
  border-radius: 16px; padding: 32px 40px; margin-bottom: 32px; color: #fff;
  position: relative; overflow: hidden; box-shadow: 0 10px 25px -5px rgba(15, 23, 42, 0.2);
}
.briefing-banner::after { content: ''; position: absolute; top: -50%; right: -10%; width: 300px; height: 300px; background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%); border-radius: 50%; }
.briefing-banner h2 { font-family: var(--font-body); font-size: 24px; font-weight: 800; margin-bottom: 12px; position: relative; z-index: 1; letter-spacing: -0.02em; }
.briefing-summary { font-size: 1.06rem; opacity: 0.9; line-height: 1.6; position: relative; z-index: 1; max-width: 80%; }
.briefing-stats-row { display: flex; gap: 40px; margin-top: 24px; flex-wrap: wrap; position: relative; z-index: 1; }
.briefing-stat { display: flex; flex-direction: column; }
.briefing-stat-num { font-size: 28px; font-weight: 800; }
.briefing-stat-label { font-size: 12px; opacity: 0.7; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; margin-top: 4px; }

.briefing-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 32px; }
.briefing-card, .job-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow-sm); transition: box-shadow 0.2s; }
.briefing-card:hover, .job-card:hover { box-shadow: var(--shadow); }
.briefing-card-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
.briefing-card-full { grid-column: 1 / -1; }

.time-block { display: flex; gap: 16px; padding: 16px 0; border-bottom: 1px solid var(--border); align-items: flex-start; }
.time-block:last-child { border-bottom: none; padding-bottom: 0; }
.tb-period { font-size: 13px; font-weight: 700; color: var(--accent); font-family: monospace; background: var(--accent-light); padding: 4px 8px; border-radius: 6px; }
.tb-body { flex: 1; }
.tb-summary { font-size: 1rem; color: var(--text); line-height: 1.6; margin-bottom: 10px; }
.tb-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.tb-tag { font-size: 11px; padding: 4px 10px; border-radius: 12px; font-weight: 600; }

.event-item {
  font-size: 1rem;
  color: var(--text-secondary);
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
  line-height: 1.8;
}

.event-item:last-child { border-bottom: none; }
.people-grid { display: flex; flex-wrap: wrap; gap: 10px; }
.people-chip { display: flex; align-items: center; gap: 8px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; min-width: 140px; }
.people-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; }
.people-info { flex: 1; }
.people-name { font-size: 13px; font-weight: 600; color: var(--text); }
.people-meta { font-size: 11px; color: var(--text-light); }

.app-bar-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; }
.app-bar-name { font-size: 12px; font-weight: 500; color: var(--text); min-width: 80px; }
.app-bar-track { flex: 1; height: 8px; background: var(--bg-active); border-radius: 4px; overflow: hidden; }
.app-bar-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #8b5cf6); border-radius: 4px; transition: width 0.6s ease; }
.app-bar-duration { font-size: 11px; color: var(--text-light); min-width: 60px; text-align: right; }

.search-stack,
.form-stack {
  display: grid;
  gap: 12px;
}

.form-label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 6px;
}

.inline-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.pipeline-layout {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(280px, 360px);
  gap: 16px;
}

.job-item {
  width: 100%;
  text-align: left;
  padding: 14px 16px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--bg);
  cursor: pointer;
  transition: all var(--transition);
}

.job-item:hover { box-shadow: var(--shadow); }
.job-item.active { border-color: rgba(46, 170, 220, 0.35); background: var(--accent-light); }

.job-log {
  margin: 0;
  padding: 14px;
  border-radius: var(--radius);
  background: var(--bg);
  border: 1px solid var(--border);
  font-family: "SFMono-Regular", "Menlo", monospace;
  white-space: pre-wrap;
  word-break: break-word;
  font-size: 12px;
  line-height: 1.6;
}

.muted { color: var(--text-light); }

.empty {
  text-align: center;
  padding: 120px 40px 80px;
  color: var(--text-light);
}

.empty .icon { font-size: 40px; margin-bottom: 12px; }

.empty-state { padding: 32px; border-radius: var(--radius); border: 1px dashed var(--border); color: var(--text-light); background: var(--bg-hover); text-align: center; font-weight: 500; }

.toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%) translateY(20px); background: #1e293b; color: #fff; padding: 12px 28px; border-radius: 30px; font-size: 14px; font-weight: 500; z-index: 3000; opacity: 0; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2); pointer-events: none; }
.toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }

@media (max-width: 900px) {
  .app { grid-template-columns: 1fr; }
  .sidebar { position: static; height: auto; }
  .main { padding: 32px 24px 80px; }
  .view-tabs { overflow-x: auto; }
  .briefing-grid, .props-grid, .charts-grid, .pipeline-layout { grid-template-columns: 1fr; }
  .timeline { padding-left: 60px; }
  .timeline::before { left: 40px; }
  .tl-node { padding-left: 24px; }
  .tl-time { left: -60px; width: 40px; }
}

/* Spotlight Overlay */
.spotlight-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); z-index: 1000; display: flex; justify-content: center; align-items: flex-start; padding-top: 12vh; opacity: 0; pointer-events: none; transition: opacity 0.2s ease; }
.spotlight-overlay.active { opacity: 1; pointer-events: auto; }
.spotlight-modal { width: 90%; max-width: 640px; background: var(--bg); border-radius: 16px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25), 0 0 0 1px rgba(255,255,255,0.1); overflow: hidden; display: flex; flex-direction: column; transform: translateY(-20px) scale(0.98); transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1); }
.spotlight-overlay.active .spotlight-modal { transform: translateY(0) scale(1); }
.spotlight-input-wrapper { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
.spotlight-icon { font-size: 20px; color: var(--text-light); }
.spotlight-input { flex: 1; background: transparent; border: none; color: var(--text); font-size: 20px; outline: none; }
.spotlight-input::placeholder { color: var(--text-light); }
.spotlight-results { max-height: 50vh; overflow-y: auto; padding: 8px; }
.spotlight-result-item { display: block; width: 100%; text-align: left; padding: 12px 16px; border-radius: 8px; background: transparent; border: none; cursor: pointer; transition: background 0.15s ease; }
.spotlight-result-item:hover, .spotlight-result-item:focus { background: var(--bg-hover); outline: none; }
.spotlight-empty { padding: 40px 20px; text-align: center; color: var(--text-light); font-size: 14px; }
@keyframes flashHighlight { 0% { background: rgba(217, 115, 13, 0.3); box-shadow: 0 0 0 2px var(--accent); } 100% { background: transparent; box-shadow: none; } }
.tl-node.highlight-target .tl-content { animation: flashHighlight 2.5s ease-out; }
.sidebar-search-btn {
  width: 100%; padding: 10px 14px; background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text-light); font-size: 13px; font-family: var(--font-body);
  display: flex; justify-content: space-between; align-items: center; cursor: pointer;
  transition: all var(--transition);
}
.sidebar-search-btn:hover { border-color: var(--text-light); box-shadow: var(--shadow-sm); color: var(--text-secondary); }
.sidebar-search-btn kbd { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11px; padding: 2px 6px; background: var(--bg-hover); border: 1px solid var(--border); border-radius: 4px; color: var(--text-light); font-weight: 500; letter-spacing: 0; line-height: 1; }
.search-highlight { background-color: #fef08a; color: #1e293b; border-radius: 4px; padding: 0 4px; font-weight: 700; box-shadow: 0 0 0 2px #fde047; }

/* Inline Correction Popover */
.correction-popover { position: fixed; z-index: 2000; background: var(--bg); border: 1px solid var(--border); border-radius: 12px; box-shadow: 0 12px 40px -8px rgba(0,0,0,0.2), 0 0 0 1px rgba(255,255,255,0.1); padding: 16px; width: 320px; display: none; animation: fadeUp 0.2s ease; }
.correction-popover::before { content: ''; position: absolute; top: -6px; left: 24px; width: 12px; height: 12px; background: var(--bg); border-left: 1px solid var(--border); border-top: 1px solid var(--border); transform: rotate(45deg); }
.cp-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.cp-title { font-size: 13px; font-weight: 700; color: var(--text); }
.cp-close { background: none; border: none; cursor: pointer; font-size: 16px; color: var(--text-light); padding: 0 4px; }
.cp-close:hover { color: var(--text); }
.cp-wrong { font-size: 13px; padding: 8px 12px; background: #fef2f2; border: 1px solid #fca5a5; border-radius: 6px; color: #dc2626; font-weight: 600; margin-bottom: 8px; word-break: break-all; }
.cp-input { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; background: var(--bg); color: var(--text); outline: none; font-family: var(--font-body); }
.cp-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }
.cp-submit { margin-top: 8px; width: 100%; padding: 10px; background: var(--text); color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity var(--transition); }
.cp-submit:hover { opacity: 0.9; }

/* Sidebar Corrections Dictionary */
.sidebar-dict { padding: 0 12px 16px; }
.sidebar-dict-toggle { display: flex; align-items: center; justify-content: space-between; width: 100%; padding: 8px 0; border: none; background: none; cursor: pointer; color: var(--text-secondary); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
.sidebar-dict-toggle:hover { color: var(--text); }
.sidebar-dict-toggle .dict-count { font-size: 10px; background: var(--bg-hover); padding: 2px 6px; border-radius: 10px; font-weight: 500; color: var(--text-light); }
.sidebar-dict-toggle .dict-arrow { font-size: 10px; transition: transform 0.2s ease; }
.sidebar-dict-toggle.open .dict-arrow { transform: rotate(180deg); }
.sidebar-dict-list { overflow: hidden; max-height: 0; transition: max-height 0.3s ease; }
.sidebar-dict-list.open { max-height: 400px; overflow-y: auto; }
.sidebar-dict-item { display: flex; align-items: baseline; gap: 6px; padding: 5px 0; font-size: 12px; border-bottom: 1px dashed var(--border); }
.sidebar-dict-item:last-child { border-bottom: none; }
.sidebar-dict-item .dict-wrong { color: #dc2626; text-decoration: line-through; font-weight: 500; }
.sidebar-dict-item .dict-arrow-icon { color: var(--text-light); font-size: 10px; }
.sidebar-dict-item .dict-right { color: var(--success); font-weight: 600; }

/* Sidebar Footer */
.sidebar-footer { margin-top: auto; padding-top: 12px; border-top: 1px solid var(--border); }
.sidebar-settings-btn { width: 100%; padding: 10px 14px; background: none; border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-secondary); font-size: 13px; font-family: var(--font-body); display: flex; align-items: center; gap: 8px; cursor: pointer; transition: all var(--transition); }
.sidebar-settings-btn:hover { border-color: var(--text-light); color: var(--text); background: var(--bg-hover); }
.sidebar-settings-btn.active { background: var(--accent-light); border-color: var(--accent); color: var(--accent); font-weight: 600; }

/* Settings Page */
.settings-page { padding: 32px 0; max-width: 720px; }
.settings-page h2 { font-size: 22px; font-weight: 700; margin-bottom: 24px; }
.settings-section { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
.settings-section-title { font-size: 13px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.settings-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; }
.settings-row label { font-size: 14px; color: var(--text); }
.settings-row .desc { font-size: 12px; color: var(--text-light); margin-top: 2px; }
.setting-options { display: flex; gap: 6px; }
.setting-opt { padding: 6px 14px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text-secondary); font-size: 12px; font-weight: 500; cursor: pointer; transition: all var(--transition); font-family: var(--font-body); }
.setting-opt:hover { border-color: var(--text-light); }
.setting-opt.active { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 600; }
.color-swatch { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--border); cursor: pointer; transition: all var(--transition); }
.color-swatch:hover { transform: scale(1.15); }
.color-swatch.active { border-color: var(--text); box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--text); }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-title">📓 OpenMy</div>
      <div class="logo-sub">每日上下文</div>
    </div>
    <div class="search-box">
      <button class="sidebar-search-btn" onclick="openSpotlight()">
        <span>🔍 全局搜索...</span>
        <kbd>⌘K</kbd>
      </button>
    </div>
    <div class="stats" id="stats"></div>
    <div class="divider"></div>
    <div class="section-label">日期</div>
    <div class="date-list" id="dateList"></div>
    <div class="divider"></div>
    <div class="sidebar-dict" id="sidebarDict">
      <button class="sidebar-dict-toggle" onclick="toggleSidebarDict()">
        <span>✉️ 校正词典 <span class="dict-count" id="dictCount">0</span></span>
        <span class="dict-arrow">▼</span>
      </button>
      <div class="sidebar-dict-list" id="sidebarDictList"></div>
    </div>
    <div class="sidebar-footer">
      <button class="sidebar-settings-btn" id="settingsBtn" onclick="openSettings()">⚙️ 设置</button>
    </div>
  </aside>

  <main class="main" id="main">
    <div class="empty" id="emptyState">
      <div class="icon">📓</div>
      <p>从左侧选择日期开始浏览</p>
    </div>
  </main>
</div>

<div class="spotlight-overlay" id="spotlightOverlay" onclick="closeSpotlight(event)">
  <div class="spotlight-modal" onclick="event.stopPropagation()">
    <div class="spotlight-input-wrapper">
      <span class="spotlight-icon">🔍</span>
      <input type="text" id="spotlightInput" class="spotlight-input" placeholder="搜索所有日期、屏幕和录音..." autocomplete="off">
    </div>
    <div class="spotlight-results" id="spotlightResults"></div>
  </div>
</div>

<div class="spotlight-overlay" id="settingsOverlay" onclick="closeSettingsOverlay(event)">
  <div class="spotlight-modal" style="max-height:85vh;overflow-y:auto;padding:0;background:var(--bg);" onclick="event.stopPropagation()">
    <div id="settingsContent" style="padding:16px;"></div>
  </div>
</div>

<div id="globalJobIndicator" style="display:none;position:fixed;top:20px;right:20px;background:var(--accent);color:white;padding:10px 16px;border-radius:30px;font-size:13px;font-weight:600;box-shadow:var(--shadow-hover);z-index:9999;align-items:center;gap:10px;cursor:pointer;transition:all 0.3s ease;animation: fadeUp 0.3s ease" onclick="openSettings()">
  <span style="width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;display:inline-block;animation:spin 1s linear infinite;"></span>
  <span id="globalJobText">AI 正在分析中...</span>
</div>
<style>@keyframes spin { to { transform: rotate(360deg); } }</style>

<div class="toast" id="toast"></div>

<div class="correction-popover" id="correctionPopover">
  <div class="cp-header">
    <span class="cp-title">✏️ 纠正识别</span>
    <button class="cp-close" onclick="closeCorrectionPopover()">✕</button>
  </div>
  <div class="cp-wrong" id="cpWrongText"></div>
  <input class="cp-input" id="cpRightInput" placeholder="改成…" autocomplete="off">
  <button class="cp-submit" onclick="submitInlineCorrection()">纠正 ⏎</button>
</div>

<script>
const PIPELINE_KIND_LABELS = {
  context: '刷新上下文',
  clean: '清理文本',
  roles: '识别对象',
  distill: '整理摘要',
  briefing: '生成日报',
  run: '重新运行',
};

const PIPELINE_STATUS_LABELS = {
  queued: '排队中',
  running: '运行中',
  succeeded: '已完成',
  failed: '失败',
};

const state = {
  allDates: [],
  stats: null,
  currentDate: '',
  currentData: null,
  currentMeta: null,
  currentBriefing: null,
  currentView: 'briefing',
  activeFilters: new Set(),
  context: {},
  loops: [],
  projects: [],
  decisions: [],
  corrections: [],
  searchResults: [],
  jobs: [],
  selectedJobId: '',
  selectedJobDetail: null,
  handledCompletedJobs: new Set(),
  chartInstances: [],
  contextQuery: {
    kind: 'project',
    query: '',
    result: null,
    loading: false,
  },
};

let searchTimer = null;

function showToast(message) {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.classList.add('visible');
  clearTimeout(showToast.timer);
  showToast.timer = setTimeout(() => toast.classList.remove('visible'), 2600);
}

function escapeHtml(value) {
  return String(value || '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#39;');
}

function plainText(value) {
  return String(value || '')
    .replace(/\*\*(.*?)\*\*/g, '$1')
    .replace(/\*(.*?)\*/g, '$1')
    .replace(/`([^`]+)`/g, '$1')
    .replace(/<[^>]+>/g, '')
    .trim();
}

function fmtText(value) {
  const safe = escapeHtml(value || '');
  return safe.split(/\n+/).map((paragraph) => paragraph.trim() ? `<p>${paragraph}</p>` : '').join('');
}

function fmtNum(value) {
  const number = Number(value || 0);
  if (number >= 10000) return `${(number / 10000).toFixed(1)}万`;
  if (number >= 1000) return `${(number / 1000).toFixed(1)}k`;
  return String(number);
}

function renderEmptyState(text) {
  return `<div class="empty-state">${escapeHtml(text)}</div>`;
}

function renderEventList(items, renderItem, emptyText) {
  if (!items || !items.length) {
    return renderEmptyState(emptyText);
  }
  return items.map(renderItem).join('');
}

function renderContextQueryResult() {
  const queryState = state.contextQuery || {};
  const result = queryState.result;
  if (queryState.loading) {
    return `
      <div id="contextQueryResults" class="search-stack">
        <div class="event-item">正在查询结构化上下文...</div>
      </div>
      <div id="contextQueryEvidence" class="search-stack"></div>
    `;
  }

  if (!result) {
    const projectPreset = state.projects[0]?.title || 'OpenMy';
    const loopPreset = state.loops[0]?.title || '';
    return `
      <div id="contextQueryResults" class="search-stack">
        <div class="event-item">还没开始查。你可以直接查项目、待办、证据。</div>
        <div class="inline-actions" style="margin-top:8px;flex-wrap:wrap">
          <button class="action-btn" type="button" onclick="runContextQuery('project', '${escapeHtml(projectPreset)}')">查项目</button>
          <button class="action-btn" type="button" onclick="runContextQuery('open', '')">查未关闭待办</button>
          <button class="action-btn" type="button" onclick="runContextQuery('closed', '')">查已关闭事项</button>
          ${loopPreset ? `<button class="action-btn" type="button" onclick="runContextQuery('evidence', '${escapeHtml(loopPreset)}')">查证据</button>` : ''}
        </div>
      </div>
      <div id="contextQueryEvidence" class="search-stack"></div>
    `;
  }

  const currentHits = result.current_hits || [];
  const historyHits = result.history_hits || [];
  const dailyRollups = result.daily_rollups || [];
  const conflicts = result.conflicts || [];
  const evidence = result.evidence || [];
  const temporal = result.temporal_buckets || {};

  const hitBlock = (title, items, emptyText) => `
    <div>
      <div style="font-weight:600;font-size:12px;color:var(--text-secondary);margin-bottom:6px">${title}</div>
      ${items.length ? items.map((item) => `
        <div class="event-item">
          <div><strong>${escapeHtml(item.title || item.summary || item.id || '')}</strong></div>
          <div class="muted">${escapeHtml(plainText(item.summary || ''))}</div>
          <div class="muted" style="font-size:12px">${escapeHtml([item.date, item.time, item.current_state || item.status].filter(Boolean).join(' · '))}</div>
        </div>
      `).join('') : `<div class="empty-state">${escapeHtml(emptyText)}</div>`}
    </div>
  `;

  return `
    <div id="contextQueryResults" class="search-stack">
      <div class="callout" style="margin-bottom:16px">
        <span class="callout-icon">🧭</span>
        <div class="callout-body">${escapeHtml(result.summary || '暂无结果')}</div>
      </div>

      <div class="briefing-grid" style="margin-bottom:12px">
        ${hitBlock('当前命中', currentHits, '当前没有命中')}
        ${hitBlock('历史命中', historyHits, '历史没有命中')}
      </div>

      <div class="briefing-grid" style="margin-bottom:12px">
        ${hitBlock('跨日汇总', dailyRollups.map((item) => ({ title: item.date, summary: item.summary })), '暂无跨日汇总')}
        ${hitBlock('时态裁决', [
          { title: `进行中 ${temporal.current?.length || 0} 条`, summary: 'current' },
          { title: `未来 ${temporal.future?.length || 0} 条`, summary: 'future' },
          { title: `过去 ${temporal.past?.length || 0} 条`, summary: 'past' },
          { title: `已关闭 ${temporal.closed?.length || 0} 条`, summary: 'closed' },
        ], '暂无时态结果')}
      </div>

      <div>
        <div style="font-weight:600;font-size:12px;color:var(--text-secondary);margin-bottom:6px">冲突识别</div>
        ${conflicts.length ? conflicts.map((item) => `
          <div class="event-item">
            <div><strong>${escapeHtml(item.title || item.canonical_key || '')}</strong></div>
            <div class="muted">${escapeHtml(item.state_reason || item.conflict_type || '')}</div>
            <div class="muted" style="font-size:12px">${escapeHtml((item.variants || []).join(' / '))}</div>
          </div>
        `).join('') : '<div class="empty-state">当前没有结构化冲突</div>'}
      </div>
    </div>
    <div id="contextQueryEvidence" class="search-stack" style="margin-top:16px">
      <div style="font-weight:600;font-size:12px;color:var(--text-secondary);margin-bottom:6px">证据回链</div>
      ${evidence.length ? evidence.map((item) => `
        <button class="event-item" type="button" onclick="jumpToEvidence('${escapeHtml(item.date || '')}', '${escapeHtml(item.time_range || '')}', '${escapeHtml(queryState.query || '')}')">
          <div><strong>scene_id</strong> ${escapeHtml(item.scene_id || 'unknown')}</div>
          <div class="muted"><strong>quote</strong> ${escapeHtml(plainText(item.quote || item.scene_summary || item.source_path || ''))}</div>
          <div class="muted" style="font-size:12px">${escapeHtml([item.date, item.time_range].filter(Boolean).join(' · '))}</div>
        </button>
      `).join('') : '<div class="empty-state">没有可回链的证据</div>'}
    </div>
  `;
}

function formatPipelineKind(value) {
  return PIPELINE_KIND_LABELS[value] || value || '未知任务';
}

function formatPipelineStatus(value) {
  return PIPELINE_STATUS_LABELS[value] || value || '未知状态';
}

function formatPipelineStep(value) {
  if (!value) return '—';
  return PIPELINE_KIND_LABELS[value] || value;
}

async function fetchJson(url, fallback = undefined) {
  try {
    const response = await fetch(url);
    if (!response.ok) {
      if (fallback !== undefined) return fallback;
      throw new Error(`${response.status} ${response.statusText}`);
    }
    return await response.json();
  } catch (error) {
    if (fallback !== undefined) return fallback;
    showToast(`请求失败：${error.message}`);
    throw error;
  }
}

async function postJson(url, payload) {
  const response = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
  });
  const data = await response.json().catch(() => ({}));
  if (!response.ok) {
    throw new Error(data.error || `${response.status} ${response.statusText}`);
  }
  return data;
}

async function init() {
  document.getElementById('spotlightInput').addEventListener('input', (event) => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => runSearchSpotlight(event.target.value.trim()), 200);
  });

  applySettings();
  await loadSidebar();
  await Promise.all([
    loadContext(),
    refreshCorrectionsFeed(),
    refreshPipelineJobs(),
  ]);

  if (state.currentData) {
    renderDayLayout();
  }

  setInterval(refreshPipelineJobs, 5000);
}

async function loadSidebar() {
  const [dates, stats] = await Promise.all([
    fetchJson('/api/dates', []),
    fetchJson('/api/stats', { total_dates: 0, total_segments: 0, total_words: 0, role_distribution: {} }),
  ]);

  state.allDates = dates || [];
  state.stats = stats || {};
  renderSidebar();

  const defaultDate = state.allDates.find((item) => item.is_default)?.date || state.allDates[0]?.date || '';
  if (defaultDate) {
    await loadDate(defaultDate);
  } else {
    document.getElementById('main').innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;min-height:75vh;text-align:center;color:var(--text-secondary);padding:40px;">
        <div style="font-size:72px;margin-bottom:24px;filter:drop-shadow(0 10px 15px rgba(0,0,0,0.1));">🎙️</div>
        <h2 style="font-size:32px;color:var(--text);margin-bottom:16px;font-family:var(--font-body);font-weight:800;letter-spacing:-0.03em;">这是你的主场</h2>
        <p style="font-size:1.1rem;max-width:500px;line-height:1.6;margin-bottom:48px">上下文引擎已启动，但目前记忆库是空的。</p>
        <div style="background:var(--bg-hover);padding:32px;border-radius:16px;text-align:left;border:1px solid var(--border);max-width:600px;width:100%;box-shadow:var(--shadow-sm);">
          <div style="font-weight:700;color:var(--text);margin-bottom:16px;font-size:1.1rem;display:flex;align-items:center;gap:8px;"><span>🚀</span> 准备给 AI 喂点数据</div>
          <p style="font-size:1rem;margin-bottom:16px;line-height:1.6;">打开本机终端，使用你的某段开会录音或日常语音，运行以下命令：</p>
          <code style="display:block;background:var(--bg);color:var(--text);padding:16px 20px;border-radius:8px;font-family:monospace;font-size:14px;border:1px solid var(--border);">openmy quick-start path/to/your-audio.wav</code>
          <p style="font-size:0.95rem;margin-top:20px;opacity:0.8;display:flex;align-items:center;gap:6px;"><span>💡</span> 处理大约需要几分钟。完成后，刷新本页面即可查看所有的上下文流。</p>
        </div>
      </div>
    `;
  }
}

function renderSidebar() {
  const stats = state.stats || {};
  document.getElementById('stats').innerHTML = `
    <span class="stat-item"><span class="stat-num">${stats.total_dates || 0}</span>天</span>
    <span class="stat-item"><span class="stat-num">${stats.total_segments || 0}</span>段</span>
    <span class="stat-item"><span class="stat-num">${fmtNum(stats.total_words || 0)}</span>字</span>
  `;

  const dateList = document.getElementById('dateList');
  if (!state.allDates.length) {
    dateList.innerHTML = renderEmptyState('暂无可用阅读数据');
    return;
  }

  dateList.innerHTML = state.allDates.map((item) => `
    <button class="date-item ${item.date === state.currentDate ? 'active' : ''}" type="button" onclick="loadDate('${escapeHtml(item.date)}')">
      <span class="icon">📄</span>
      ${escapeHtml(item.date)}
      <span class="meta">${item.segments}段</span>
    </button>
  `).join('');
}

async function loadContext() {
  const [context, loops, projects, decisions] = await Promise.all([
    fetchJson('/api/context', {}),
    fetchJson('/api/context/loops', []),
    fetchJson('/api/context/projects', []),
    fetchJson('/api/context/decisions', []),
  ]);

  state.context = context || {};
  state.loops = loops || [];
  state.projects = projects || [];
  state.decisions = decisions || [];

  if (document.getElementById('view-overview')) {
    renderOverviewView();
  }
  if (document.getElementById('view-corrections')) {
    renderCorrectionsView();
  }
}

async function runContextQuery(kind = '', query = '') {
  const kindEl = document.getElementById('contextQueryKind');
  const inputEl = document.getElementById('contextQueryInput');
  const finalKind = kind || kindEl?.value || state.contextQuery.kind || 'project';
  const finalQuery = query !== '' ? query : (inputEl?.value || '').trim();

  state.contextQuery.kind = finalKind;
  state.contextQuery.query = finalQuery;
  state.contextQuery.loading = true;
  renderOverviewView();

  const params = new URLSearchParams({
    kind: finalKind,
    limit: '8',
    evidence: '1',
  });
  if (finalQuery) {
    params.set('q', finalQuery);
  }

  try {
    state.contextQuery.result = await fetchJson(`/api/context/query?${params.toString()}`, {
      summary: '查询失败',
      current_hits: [],
      history_hits: [],
      daily_rollups: [],
      temporal_buckets: { current: [], future: [], past: [], closed: [] },
      conflicts: [],
      evidence: [],
    });
  } finally {
    state.contextQuery.loading = false;
    renderOverviewView();
  }
}

async function jumpToEvidence(date, timeRange = '', query = '') {
  const time = String(timeRange || '').split('-', 1)[0] || '';
  if (!date) {
    return;
  }
  await loadDate(date, time, query);
}

async function loadDate(date, focusTime = '', focusQuery = '') {
  // Template routes: /api/date/${date}/meta and /api/date/${date}/briefing
  const [detail, meta, briefing] = await Promise.all([
    fetchJson(`/api/date/${date}`, null),
    fetchJson(`/api/date/${date}/meta`, null),
    fetchJson(`/api/date/${date}/briefing`, null),
  ]);

  if (!detail) {
    showToast(`日期 ${date} 不存在`);
    return;
  }

  state.currentDate = date;
  state.currentData = detail;
  state.currentMeta = meta || detail.meta || {};
  state.currentBriefing = briefing || null;
  renderSidebar();
  renderDayLayout();

  if (focusTime) {
    switchView('timeline');
    requestAnimationFrame(() => scrollToSegment(focusTime, focusQuery));
  }
}

  const cards = groups.map((group) => {
    const items = meta?.[group.key] || [];

    return `<div class="prop-card">
      <div class="prop-card-title"><span class="dot" style="background:${group.dot}"></span>${group.title} <span class="prop-count">${items.length}</span></div>

function getSegmentDistillation(segment, meta) {
  const highlights = [];
  (meta.events || []).filter((item) => item.time === segment.time).forEach((item) => {
    highlights.push(`📌 <strong>${escapeHtml(item.project || '事件')}</strong> ${escapeHtml(plainText(item.summary || ''))}`);
  });
  (meta.decisions || []).filter((item) => item.time === segment.time).forEach((item) => {
    highlights.push(`🎯 <strong>${escapeHtml(item.project || '决策')}</strong> ${escapeHtml(plainText(item.what || item.decision || ''))}`);
  });
  (meta.todos || []).filter((item) => item.time === segment.time).forEach((item) => {
    highlights.push(`✅ <strong>${escapeHtml(item.project || '待办')}</strong> ${escapeHtml(plainText(item.task || ''))}`);
  });
  if (highlights.length > 0) return `📌 <strong>摘要</strong><br>${highlights.join('<br>')}`;
  if (segment.summary) return `📌 <strong>摘要</strong> ${escapeHtml(plainText(segment.summary))}`;
  return `📌 <strong>片段</strong> ${escapeHtml(plainText(segment.preview || ''))}`;
}

function initCharts() {
  if (!state.currentData) return;
  state.chartInstances.forEach((chart) => chart.destroy());
  state.chartInstances = [];



  const timeCounts = {};
  state.currentData.segments.forEach((segment) => {
    const hour = `${String(segment.time).split(':')[0]}:00`;
    timeCounts[hour] = (timeCounts[hour] || 0) + plainText(segment.text || '').length;
  });

  const timeCanvas = document.getElementById('chartTime');
  if (timeCanvas) {
    const sortedHours = Object.keys(timeCounts).sort();
    state.chartInstances.push(new Chart(timeCanvas, {
      type: 'bar',
      data: {
        labels: sortedHours,
        datasets: [{
          label: '字数',
          data: sortedHours.map((hour) => timeCounts[hour]),
          backgroundColor: '#2eaadc',
          borderRadius: 4,
        }],
      },
      options: { plugins: { legend: { display: false } }, maintainAspectRatio: false },
    }));
  }
}

function optionMarkup(items, getter) {
  if (!items || !items.length) {
    return '<option value="">暂无可选项</option>';
  }
  return items.map((item) => {
    const value = getter(item);
    return `<option value="${escapeHtml(value)}">${escapeHtml(value)}</option>`;
  }).join('');
}

function switchView(viewName) {
  state.currentView = viewName;
  document.querySelectorAll('.view-tab').forEach((node) => {
    node.classList.toggle('active', node.id === `tab-${viewName}`);
  });
  document.querySelectorAll('.view-content').forEach((node) => {
    node.classList.toggle('active', node.id === `view-${viewName}`);
  });
  const filterBar = document.getElementById('filter-bar');
  if (filterBar) {
    filterBar.style.display = viewName === 'timeline' ? 'flex' : 'none';
  }
  if (viewName === 'charts') {
    setTimeout(initCharts, 50);
  }
}

function toggleRawText(button) {
  const rawNode = button.parentElement.nextElementSibling;
  const visible = !rawNode.classList.contains('visible');
  rawNode.classList.toggle('visible', visible);
  button.innerHTML = visible ? '🙈 隐藏原文' : '👁️ 显示原文';
  button.style.color = visible ? '#fff' : 'var(--text-secondary)';
  button.style.background = visible ? 'var(--text)' : 'var(--bg-sidebar)';
}

function filterRole(role) {
  if (role === 'all') {
    state.activeFilters.clear();
  } else if (state.activeFilters.has(role)) {
    state.activeFilters.delete(role);
  } else {
    state.activeFilters.add(role);
  }

  document.querySelectorAll('.role-tag').forEach((button) => {
    if (button.dataset.role === 'all') {
      button.classList.toggle('active', state.activeFilters.size === 0);
    } else {
      button.classList.toggle('active', state.activeFilters.has(button.dataset.role));
    }
  });

  document.querySelectorAll('#view-timeline .tl-node').forEach((node) => {
    if (state.activeFilters.size === 0) {
      node.classList.remove('hidden');
      return;
    }
    let matched = false;
    if (state.activeFilters.has('needs_review') && node.dataset.needsReview === 'true') matched = true;
    if (state.activeFilters.has(node.dataset.role)) matched = true;
    node.classList.toggle('hidden', !matched);
  });
}

function scrollToSegment(time, query = '') {
  document.querySelectorAll('.highlight-target').forEach(n => n.classList.remove('highlight-target'));
  const nodes = Array.from(document.querySelectorAll('[data-segment-time]'));
  const target = nodes.find((node) => node.dataset.segmentTime === time);
  if (!target) return;
  target.scrollIntoView({ behavior: 'smooth', block: 'center' });
  target.classList.add('highlight-target');

  const rawNode = target.querySelector('.seg-raw');
  const btnNode = target.querySelector('.raw-btn');
  if (rawNode && !rawNode.classList.contains('visible')) {
    rawNode.classList.add('visible');
    if (btnNode) {
      btnNode.innerHTML = '🙈 隐藏原文';
      btnNode.style.color = '#fff';
      btnNode.style.background = 'var(--text)';
    }
  }

  if (query && rawNode) {
    let originalHtml = rawNode.dataset.originalHtml;
    if (!originalHtml) {
      originalHtml = rawNode.innerHTML;
      rawNode.dataset.originalHtml = originalHtml;
    }
    try {
      const escapeRegExp = (string) => string.replace(/[.*+?^${}()|[\\]\\\\]/g, '\\\\$&');
      const escapedQuery = escapeRegExp(query);
      const regex = new RegExp(`(${escapedQuery})`, 'gi');
      rawNode.innerHTML = originalHtml.replace(regex, '<mark class="search-highlight">$1</mark>');
    } catch(e) {
      console.error(e);
    }
  }
}

async function refreshCorrectionsFeed() {
  const payload = await fetchJson('/api/corrections', { corrections: [] });
  state.corrections = payload.corrections || [];
  renderSidebarDict();
  if (document.getElementById('view-corrections')) {
    renderCorrectionsView();
  }
}

async function submitTypoCorrection() {
  const wrong = document.getElementById('typoWrong')?.value.trim() || '';
  const right = document.getElementById('typoRight')?.value.trim() || '';
  const context = document.getElementById('typoContext')?.value.trim() || '';
  if (!wrong || !right) {
    showToast('原文和改成内容都不能为空');
    return;
  }
  try {
    await postJson('/api/correct/typo', {
      wrong,
      right,
      context,
      date: state.currentDate,
      sync_vocab: true,
    });
    showToast(`已保存校正：${wrong} → ${right}`);
    await refreshCorrectionsFeed();
    if (state.currentDate) {
      await loadDate(state.currentDate);
    }
  } catch (error) {
    showToast(error.message);
  }
}

function toggleAccordion(titleEl) {
  const body = titleEl.nextElementSibling;
  if (!body) return;
  const isHidden = body.style.display === 'none';
  body.style.display = isHidden ? 'block' : 'none';
  const arrow = titleEl.querySelector('span');
  if (arrow) arrow.textContent = isHidden ? '▲ 收起' : '▼ 展开';
}

async function submitContextAction(url, payload, successMessage) {
  try {
    await postJson(url, payload);
    showToast(successMessage);
    await loadContext();
    renderCorrectionsView();
    renderOverviewView();
  } catch (error) {
    showToast(error.message);
  }
}

function openSpotlight() {
  document.getElementById('spotlightOverlay').classList.add('active');
  document.getElementById('spotlightInput').focus();
}

function closeSpotlight(e) {
  if (e && e.target !== document.getElementById('spotlightOverlay')) return;
  document.getElementById('spotlightOverlay').classList.remove('active');
}

document.addEventListener('keydown', (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    openSpotlight();
  }
  if ((e.metaKey || e.ctrlKey) && e.key === ',') {
    e.preventDefault();
    const overlay = document.getElementById('settingsOverlay');
    if (overlay.classList.contains('active')) {
      closeSettingsOverlay();
    } else {
      openSettings();
    }
  }
  if (e.key === 'Escape') {
    closeSpotlight();
    closeSettingsOverlay();
  }
});

async function runSearchSpotlight(query) {
  const container = document.getElementById('spotlightResults');
  if (!query) {
    container.innerHTML = '';
    return;
  }
  const results = await fetchJson(`/api/search?q=${encodeURIComponent(query)}`, []);
  if (!results.length) {
    container.innerHTML = '<div class="spotlight-empty">找不到相关的上下文</div>';
    return;
  }
  container.innerHTML = results.map(item => `
    <button class="spotlight-result-item" onclick="jumpToSearchResult('${escapeHtml(item.date)}', '${escapeHtml(item.time)}', '${escapeHtml(query)}')">
      <strong style="display:block;margin-bottom:4px;color:var(--text);font-size:13px">${escapeHtml(item.date)} · ${escapeHtml(item.time)}</strong>
      <div class="muted" style="font-size:12px;line-height:1.5">${item.context || escapeHtml(plainText(item.raw_context || ''))}</div>
    </button>
  `).join('');
}

async function jumpToSearchResult(date, time, query = '') {
  closeSpotlight();
  if (state.currentDate !== date) {
    await loadDate(date, time, query);
  } else {
    switchView('timeline');
    requestAnimationFrame(() => scrollToSegment(time, query));
  }
}

async function createPipelineJob(kind) {
  const explicitDate = document.getElementById('pipelineDateInput')?.value.trim() || '';
  const payload = { kind };
  if (kind !== 'context') {
    payload.target_date = explicitDate || state.currentDate || '';
  }

  try {
    const job = await postJson('/api/pipeline/jobs', payload);
    state.selectedJobId = job.job_id;
    showToast(`已开始：${formatPipelineKind(kind)}`);
    await refreshPipelineJobs();
  } catch (error) {
    showToast(error.message);
  }
}

async function refreshPipelineJobs() {
  state.jobs = await fetchJson('/api/pipeline/jobs', []);
  if (state.selectedJobId && !state.jobs.find((job) => job.job_id === state.selectedJobId)) {
    state.selectedJobId = '';
    state.selectedJobDetail = null;
  }
  if (!state.selectedJobId && state.jobs.length) {
    state.selectedJobId = state.jobs[0].job_id;
  }
  if (state.selectedJobId) {
    await loadPipelineJobDetail(state.selectedJobId, false);
  }
  
  // Pipeline UI Live Updates
  const settingsList = document.getElementById('pipelineJobsList');
  if (settingsList) {
    settingsList.innerHTML = renderEventList(state.jobs, (job) => `<button class="job-item ${job.job_id===state.selectedJobId?'active':''}" type="button" onclick="loadPipelineJobDetail('${escapeHtml(job.job_id)}')">
      <strong>${escapeHtml(formatPipelineKind(job.kind))}</strong>
      <div class="muted">${escapeHtml(job.target_date||'全局')} · ${escapeHtml(formatPipelineStatus(job.status))}</div>
    </button>`, '还没有运行记录。');
  }

  // Global Indicator Logic
  const activeJobs = state.jobs.filter(j => j.status === 'pending' || j.status === 'running');
  const indicator = document.getElementById('globalJobIndicator');
  if (indicator) {
    if (activeJobs.length > 0) {
      document.getElementById('globalJobText').textContent = `正在后台执行 ${activeJobs.length} 个分析任务...`;
      indicator.style.display = 'flex';
    } else {
      indicator.style.display = 'none';
    }
  }
}

async function loadPipelineJobDetail(jobId, rerender = true) {
  const detail = await fetchJson(`/api/pipeline/jobs/${jobId}`, null);
  if (!detail) return;
  state.selectedJobId = jobId;
  state.selectedJobDetail = detail;

  if (detail.status === 'succeeded' && !state.handledCompletedJobs.has(detail.job_id)) {
    state.handledCompletedJobs.add(detail.job_id);
    await handleJobCompletion(detail);
  }

  if (rerender && document.getElementById('view-pipeline')) {
    renderPipelineView();
  }
}

async function handleJobCompletion(job) {
  if (job.kind === 'context') {
    await loadContext();
    showToast('上下文已刷新');
    return;
  }
  if (job.target_date && job.target_date === state.currentDate) {
    await loadDate(state.currentDate);
    showToast(`${formatPipelineKind(job.kind)}已完成，并已刷新当前日期`);
  }
}

function applySettings() {
  const theme = localStorage.getItem('openmy-theme') || 'light';
  const fontSize = localStorage.getItem('openmy-font-size') || 'medium';
  const accent = localStorage.getItem('openmy-accent') || 'blue';
  const html = document.documentElement;
  if (theme === 'auto') {
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    html.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
  } else {
    html.setAttribute('data-theme', theme);
  }
  if (fontSize !== 'medium') { html.setAttribute('data-font-size', fontSize); } else { html.removeAttribute('data-font-size'); }
  if (accent !== 'blue') { html.setAttribute('data-accent', accent); } else { html.removeAttribute('data-accent'); }
}

function saveSetting(key, value) {
  localStorage.setItem('openmy-' + key, value);
  applySettings();
  applySettingsUI();
}

function applySettingsUI() {
  const theme = localStorage.getItem('openmy-theme') || 'light';
  const fontSize = localStorage.getItem('openmy-font-size') || 'medium';
  const accent = localStorage.getItem('openmy-accent') || 'blue';
  document.querySelectorAll('#themeOptions .setting-opt').forEach(b => b.classList.toggle('active', b.dataset.val === theme));
  document.querySelectorAll('#fontSizeOptions .setting-opt').forEach(b => b.classList.toggle('active', b.dataset.val === fontSize));
  document.querySelectorAll('#accentOptions .color-swatch').forEach(b => b.classList.toggle('active', b.dataset.val === accent));
}

// Listen for system theme changes
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
  if (localStorage.getItem('openmy-theme') === 'auto') applySettings();
});

  if (!countEl || !listEl) return;
  const items = state.corrections || [];
  countEl.textContent = items.length;
  if (!items.length) {
    listEl.innerHTML = '<div style="padding:8px 0;font-size:11px;color:var(--text-light)">还没有校正记录</div>';
    return;
  }
  listEl.innerHTML = items.map(item => `
    <div class="sidebar-dict-item">
      <span class="dict-wrong">${escapeHtml(item.wrong)}</span>
      <span class="dict-arrow-icon">→</span>
      <span class="dict-right">${escapeHtml(item.right)}</span>
    </div>
  `).join('');
}

function toggleSidebarDict() {
  const btn = document.querySelector('.sidebar-dict-toggle');
  const list = document.getElementById('sidebarDictList');
  btn.classList.toggle('open');
  list.classList.toggle('open');
}

// === Inline Correction Popover ===
document.addEventListener('mouseup', (e) => {
  const selection = window.getSelection();
  const selectedText = selection?.toString().trim();
  if (!selectedText || selectedText.length < 2 || selectedText.length > 50) return;
  const targetEl = e.target;
  if (targetEl.closest('input, textarea, button, select, .correction-popover, .spotlight-modal')) return;
  if (!targetEl.closest('.seg-raw, .seg-distilled, .tl-card, .briefing-card, .spotlight-result-item, .event-item, .prop-item, .time-block')) return;
  openCorrectionPopover(selectedText, e.clientX, e.clientY);
});

function openCorrectionPopover(wrongText, mouseX, mouseY) {
  const popover = document.getElementById('correctionPopover');
  const wrongEl = document.getElementById('cpWrongText');
  const rightInput = document.getElementById('cpRightInput');
  wrongEl.textContent = wrongText;
  rightInput.value = '';
  popover.style.display = 'block';
  const rect = popover.getBoundingClientRect();
  let top = mouseY + 12;
  let left = mouseX - 24;
  if (top + rect.height > window.innerHeight) top = mouseY - rect.height - 12;
  if (left + rect.width > window.innerWidth) left = window.innerWidth - rect.width - 16;
  if (left < 8) left = 8;
  popover.style.top = top + 'px';
  popover.style.left = left + 'px';
  setTimeout(() => rightInput.focus(), 50);
}

function closeCorrectionPopover() {
  document.getElementById('correctionPopover').style.display = 'none';
}

async function submitInlineCorrection() {
  const wrong = document.getElementById('cpWrongText').textContent.trim();
  const right = document.getElementById('cpRightInput').value.trim();
  if (!right) { showToast('请输入正确的文本'); return; }
  if (wrong === right) { showToast('纠正前后相同'); return; }
  try {
    await postJson('/api/correct/typo', {
      wrong, right, context: '', date: state.currentDate, sync_vocab: true,
    });
    closeCorrectionPopover();
    showToast(`已纠正：${wrong} → ${right}`);
    await refreshCorrectionsFeed();
    if (state.currentDate) await loadDate(state.currentDate);
  } catch (err) { showToast(err.message); }
}

document.getElementById('cpRightInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { e.preventDefault(); submitInlineCorrection(); }
  if (e.key === 'Escape') closeCorrectionPopover();
});

document.addEventListener('mousedown', (e) => {
  const popover = document.getElementById('correctionPopover');
  if (popover.style.display !== 'none' && !popover.contains(e.target)) {
    closeCorrectionPopover();
  }
});

init();
</script>
</body>
</html>
